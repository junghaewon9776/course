<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>통계 - 방역 횟수</title>
  <link rel="stylesheet" href="style.css?v=20260611b">
  <style>
    table { width:100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 6px 8px; border: 1px solid #ddd; text-align: center; }
    th { background: #34495e; color: #fff; position: sticky; top: 0; }
    td:first-child { text-align: left; font-weight: 600; background: #f8f9fa; white-space: nowrap; }
    th:first-child { white-space: nowrap; }
    tr:hover td { background: #fffde7; }
    .num-zero { color: #ccc; }
    .num-high { background: #c8e6c9; font-weight: 700; }
    .scroll-x { overflow-x: auto; max-height: 600px; }
  </style>
</head>
<body>
<header>
  <h1>📈 통계 - 방역 횟수</h1>
  <nav>
    <a href="index.html">홈</a>
    <a href="admin.html">관리</a>
    <a href="members.html">인원</a>
    <a href="today.html">오늘운영</a>
    <a href="monitor.html">모니터링</a>
    <a href="monitor.html?logs=1">운행기록</a>
    <a href="stats.html" class="active">통계</a>
    <a href="accounts.html" class="super-nav" style="display:none;">계정</a>
    <a href="#" onclick="adminLogout();return false;">로그아웃</a>
  </nav>
</header>

<div class="container">
  <div class="card">
    <div class="flex-between" style="flex-wrap:wrap;gap:8px;">
      <h2>필터</h2>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
        <label style="display:inline;font-size:12px;">년도:</label>
        <select id="yearFilter" onchange="render()" style="width:auto;display:inline-block;"></select>
        <label style="display:inline;font-size:12px;">행사:</label>
        <select id="eventFilter" onchange="render()" style="width:auto;display:inline-block;">
          <option value="">전체</option>
        </select>
        <label style="display:inline;font-size:12px;">기간:</label>
        <select id="period" onchange="onPeriodChange()" style="width:auto;display:inline-block;">
          <option value="all">전체</option>
          <option value="month">최근 30일</option>
          <option value="week">최근 7일</option>
          <option value="today">오늘</option>
          <option value="day">일별 선택</option>
          <option value="monthly">월별 선택</option>
          <option value="range">기간 선택</option>
        </select>
        <span id="dayPicker" style="display:none;">
          <input type="date" id="dayInput" onchange="render()" style="width:auto;display:inline-block;">
        </span>
        <span id="monthPicker" style="display:none;">
          <input type="month" id="monthInput" onchange="render()" style="width:auto;display:inline-block;">
        </span>
        <span id="rangePicker" style="display:none;">
          <input type="date" id="rangeStart" onchange="render()" style="width:auto;display:inline-block;">
          ~
          <input type="date" id="rangeEnd" onchange="render()" style="width:auto;display:inline-block;">
        </span>
        <button class="small" onclick="exportStatsCSV()">⬇️ 엑셀</button>
      </div>
    </div>
  </div>

  <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:8px;">
    <label style="font-size:12px;">그룹:</label>
    <select id="memberGroupBy" onchange="render()" style="width:auto;display:inline-block;">
      <option value="member" selected>회원 전체</option>
      <option value="driver">운전자만</option>
      <option value="assist">보조자만</option>
      <option value="team">조별</option>
    </select>
    <label style="font-size:12px;margin-left:8px;">상세:</label>
    <button id="detailToggle" class="small" onclick="toggleDetail()" style="font-size:12px;">상세 켜기</button>
    <span style="font-size:11px;color:#888;margin-left:8px;">💰 단가는 행사별로 설정</span>
  </div>

  <div id="hofTop"></div>
  <div id="myRankCard"></div>
  <div id="statsContainer"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js?v=20260512v"></script>
<script src="common.js?v=20260716e"></script>
<script>
let __charts = []; // 동적 차트 인스턴스 추적

window.onAuthSuccess = () => onDataReady(render);
let __statsSig = null, __statsTimer = null;
function __statsSignature() {
  const d = loadData() || {};
  const skip = { live: 1, pushLog: 1, deviceNames: 1, pushTokens: 1, photos: 1, mapDefault: 1 };
  const o = {}; for (const k in d) if (!skip[k]) o[k] = d[k];
  try { return JSON.stringify(o); } catch (e) { return String(Date.now()); }
}
window.onDataChanged = () => {
  const sig = __statsSignature();
  if (sig === __statsSig) return;            // /live 등 통계와 무관한 변경은 무시(깜빡임 방지)
  __statsSig = sig;
  clearTimeout(__statsTimer);
  __statsTimer = setTimeout(render, 250);    // 연속 변경은 묶어서 한 번만 그림
};
checkAdminAuth().then(ok => { if (ok) onDataReady(render); });

// 관리자 👁 토글로 숨긴 행사는 통계에서도 제외
function isEventVisibleForViewer(eventId, data) {
  if (!data) data = loadData();
  const v = (data.visibility || {}).events || {};
  return v[eventId] !== false;
}

function renderEventFilterOptions() {
  const sel = document.getElementById('eventFilter');
  if (!sel) return;
  const data = loadData();
  const cur = sel.value;
  const visible = (data.events || []).filter(e => isEventVisibleForViewer(e.id, data));
  sel.innerHTML = '<option value="">전체</option>' +
    visible.map(e => `<option value="${e.id}"${cur===e.id?' selected':''}>${e.name}</option>`).join('');
}
function renderYearOptions() {
  const sel = document.getElementById('yearFilter');
  if (!sel) return;
  const data = loadData();
  const years = new Set();
  (data.logs || []).forEach(l => { if (l && l.startedAt) years.add(new Date(l.startedAt).getFullYear()); });
  const curYear = new Date().getFullYear();
  years.add(curYear);
  const sorted = Array.from(years).sort((a, b) => b - a);
  const prev = sel.value;
  sel.innerHTML = '<option value="">전체 년도</option>' + sorted.map(y => '<option value="' + y + '">' + y + '년</option>').join('');
  sel.value = prev || String(curYear);
}

let __showDetail = false;
function toggleDetail() {
  __showDetail = !__showDetail;
  const btn = document.getElementById('detailToggle');
  btn.textContent = __showDetail ? '상세 끄기' : '상세 켜기';
  btn.className = __showDetail ? 'small success' : 'small';
  render();
}
function detailSuffix(c) {
  return (__showDetail && c.detail) ? ' (' + c.detail + ')' : '';
}

function saveEventUnitPrice(eventId, val) {
  const data = loadData();
  const ev = (data.events || []).find(e => e.id === eventId);
  if (!ev) return;
  const num = parseInt(val);
  if (isNaN(num) || num < 0) { ev.unitPrice = null; }
  else { ev.unitPrice = num; }
  saveData(data);
  render();
}

function onPeriodChange() {
  const period = document.getElementById('period').value;
  document.getElementById('dayPicker').style.display = period === 'day' ? 'inline-block' : 'none';
  document.getElementById('monthPicker').style.display = period === 'monthly' ? 'inline-block' : 'none';
  document.getElementById('rangePicker').style.display = period === 'range' ? 'inline-block' : 'none';
  if (period === 'day' && !document.getElementById('dayInput').value) {
    document.getElementById('dayInput').value = todayStr();
  } else if (period === 'monthly' && !document.getElementById('monthInput').value) {
    document.getElementById('monthInput').value = todayStr().slice(0, 7);
  } else if (period === 'range') {
    if (!document.getElementById('rangeStart').value) document.getElementById('rangeStart').value = todayStr();
    if (!document.getElementById('rangeEnd').value) document.getElementById('rangeEnd').value = todayStr();
  }
  render();
}

function getFilteredLogs() {
  const data = loadData();
  const period = document.getElementById('period').value;
  const now = Date.now();
  let from = 0, to = Infinity;
  if (period === 'today') {
    const d = new Date(); d.setHours(0,0,0,0);
    from = d.getTime();
  } else if (period === 'week') from = now - 7*24*60*60*1000;
  else if (period === 'month') from = now - 30*24*60*60*1000;
  else if (period === 'day') {
    const v = document.getElementById('dayInput').value;
    if (v) {
      const d = new Date(v + 'T00:00:00');
      from = d.getTime();
      to = from + 24*60*60*1000;
    }
  } else if (period === 'monthly') {
    const v = document.getElementById('monthInput').value;
    if (v) {
      const [y, m] = v.split('-').map(Number);
      from = new Date(y, m-1, 1).getTime();
      to = new Date(y, m, 1).getTime();
    }
  } else if (period === 'range') {
    const s = document.getElementById('rangeStart').value;
    const e = document.getElementById('rangeEnd').value;
    if (s) from = new Date(s + 'T00:00:00').getTime();
    if (e) to = new Date(e + 'T23:59:59').getTime();
  }
  const eventFilter = document.getElementById('eventFilter')?.value || '';
  const yearFilter = document.getElementById('yearFilter')?.value || '';
  return (data.logs || []).filter(l => {
    if (l.hidden) return false;
    const t = l.startedAt || 0;
    if (t < from || t > to) return false;
    if (!l.finishedAt) return false;
    if (eventFilter && l.eventId !== eventFilter) return false;
    if (yearFilter && String(new Date(t).getFullYear()) !== yearFilter) return false;
    if (!isEventVisibleForViewer(l.eventId, data)) return false;
    return true;
  });
}


// 한 로그에서 그룹 키 뽑아내기 (groupBy에 따라)
function logGroupKeys(log, groupBy, data) {
  const keys = [];
  if (groupBy === 'member') {
    if (log.crew?.driver) keys.push(log.crew.driver.trim());
    if (log.crew?.assist) {
      log.crew.assist.split(',').map(s => s.trim()).filter(Boolean).forEach(n => keys.push(n));
    }
  } else if (groupBy === 'driver') {
    if (log.crew?.driver) keys.push(log.crew.driver.trim());
  } else if (groupBy === 'assist') {
    if (log.crew?.assist) {
      log.crew.assist.split(',').map(s => s.trim()).filter(Boolean).forEach(n => keys.push(n));
    }
  } else if (groupBy === 'team') {
    const team = getTeam(data, log.teamId);
    if (team) keys.push(team.name);
  }
  return keys;
}

const GROUP_LABELS = {
  member: { row: '회원', title: '회원별 방역 횟수 (코스별 누적)' },
  driver: { row: '운전자', title: '운전자별 방역 횟수 (코스별 누적)' },
  assist: { row: '보조자', title: '보조자별 방역 횟수 (코스별 누적)' },
  team:   { row: '조',   title: '조별 방역 횟수 (코스별 누적)' }
};

function render() {
  __qWinCache = null;   // 필터 바뀔 수 있으니 월별/년도 1등 캐시 초기화
  renderEventFilterOptions();
  renderYearOptions();
  try { renderHallOfFameTop(); } catch (e) {}
  try { renderMyRankCard(); } catch (e) {}
  const data = loadData();
  const allLogs = getFilteredLogs();
  const members = data.members || [];
  const groupBy = document.getElementById('memberGroupBy')?.value || 'member';
  const labels = GROUP_LABELS[groupBy] || GROUP_LABELS.member;
  const eventFilter = document.getElementById('eventFilter')?.value || '';

  // 이전 차트 정리
  __charts.forEach(c => c.destroy());
  __charts = [];

  // 표시할 행사 목록
  const visibleEvents = (data.events || []).filter(e => {
    if (!isEventVisibleForViewer(e.id, data)) return false;
    if (eventFilter && e.id !== eventFilter) return false;
    return true;
  });

  const container = document.getElementById('statsContainer');
  container.innerHTML = '';

  visibleEvents.forEach(event => {
    const courses = (event.courses || []).map(c => ({ id: c.id, label: c.name, detail: c.detail || '', color: c.color }));
    if (!courses.length) return;
    const logs = allLogs.filter(l => l.eventId === event.id);

    // 집계
    const matrix = {}, memberTotals = {}, courseTotals = {};
    for (const log of logs) {
      const courseId = log.courseId;
      for (const name of logGroupKeys(log, groupBy, data)) {
        if (!matrix[name]) matrix[name] = {};
        matrix[name][courseId] = (matrix[name][courseId] || 0) + 1;
        memberTotals[name] = (memberTotals[name] || 0) + 1;
      }
      courseTotals[courseId] = (courseTotals[courseId] || 0) + 1;
    }

    const uid = 'ev_' + event.id.replace(/[^a-zA-Z0-9]/g,'');

    // 섹션 HTML
    const section = document.createElement('div');
    section.innerHTML = `
      <div class="card" style="border-left:4px solid #2c3e50;margin-bottom:6px;">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;">
          <h2 style="font-size:16px;margin:0;">📋 ${event.name}</h2>
          <div style="display:flex;align-items:center;gap:4px;">
            <label style="font-size:12px;font-weight:600;color:#555;">💰 단가:</label>
            <input type="number" id="up_${uid}" value="${event.unitPrice ?? ''}" min="0" step="1000"
              placeholder="미설정" style="width:90px;font-size:12px;padding:4px 6px;"
              onchange="saveEventUnitPrice('${event.id}', this.value)">
            <span style="font-size:11px;color:#888;">원</span>
          </div>
        </div>
      </div>
      <div class="card">
        <h2>📅 일자별 운행 기록</h2>
        <div class="scroll-x"><table id="daily_${uid}"></table></div>
      </div>
      <div class="row">
        <div class="col" style="flex:1;min-width:320px;">
          <div class="card">
            <h2>${labels.title}</h2>
            <div id="mcScroll_${uid}" style="max-height:500px;overflow-y:auto;">
              <div id="mcWrap_${uid}" style="position:relative;"><canvas id="mc_${uid}"></canvas></div>
            </div>
          </div>
        </div>
        <div class="col" style="flex:1;min-width:320px;">
          <div class="card">
            <h2>코스별 방역 총 횟수</h2>
            <canvas id="cc_${uid}" style="max-height:400px;"></canvas>
          </div>
        </div>
      </div>
      <div class="card">
        <h2>회원 × 코스 누적</h2>
        <div class="scroll-x"><table id="tb_${uid}"></table></div>
      </div>
      <div class="card" id="rankCard_${uid}" style="border-left:4px solid #8e44ad;display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;">
          <h2 style="margin:0;">🎖 계급 (경험치)</h2>
          <button class="small" id="rankEditBtn_${uid}" style="background:#8e44ad;display:none;" onclick="editRankTiers()">⚙ 계급 설정</button>
        </div>
        <div id="rank_${uid}" style="margin-top:8px;"></div>
      </div>
    `;
    container.appendChild(section);

    // 단가 (행사별 저장값)
    const hasUnitPrice = event.unitPrice != null && event.unitPrice !== '';
    const unitPrice = hasUnitPrice ? (parseInt(event.unitPrice) || 0) : 0;
    const fmtWon = v => (v != null) ? '₩' + v.toLocaleString() : '';

    // ── 일자별 운행 기록 표 ──
    const sortedLogs = [...logs].sort((a,b) => (b.startedAt||0) - (a.startedAt||0));
    const courseColTotals = {};
    courses.forEach(c => { courseColTotals[c.id] = 0; });

    const S = 'font-size:11px;padding:2px 4px;white-space:nowrap;';  // 작고 한 줄
    const hhmm = ts => { if (!ts) return '-'; const t = new Date(ts); return `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`; };
    const timeHead = __showDetail ? `<th style="${S}">시작</th><th style="${S}">종료</th><th style="${S}">소요</th>` : '';
    let dHead = `<tr><th style="${S}">일자</th><th style="${S}">방역자</th><th style="${S}">보조자</th><th style="${S}">조</th>${timeHead}` + courses.map(c =>
      `<th style="${S}background:${c.color};color:#fff;">${c.label}${__showDetail && c.detail ? ' ('+c.detail+')' : ''}</th>`
    ).join('') + `<th style="${S}">총계</th></tr>`;
    let dBody = '';
    for (const log of sortedLogs) {
      const d = new Date(log.startedAt || 0);
      const dayNames = ['일','월','화','수','목','금','토'];
      const dateStr = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}(${dayNames[d.getDay()]})`;
      const driver = log.crew?.driver || '-';
      const assist = log.crew?.assist || '-';
      let team = '-';
      if (log.teamId) {
        team = getTeam(data, log.teamId)?.name || '-';
      } else if (driver !== '-') {
        const driverMember = (data.members || []).find(m => (m.name||'').trim() === driver.trim());
        if (driverMember) {
          const found = (data.teams || []).find(t =>
            t.leaderId === driverMember.id || t.viceLeaderId === driverMember.id || (t.memberIds || []).includes(driverMember.id)
          );
          if (found) team = found.name;
        }
      }
      let timeCells = '';
      if (__showDetail) {
        const startStr = hhmm(log.startedAt);
        const endStr = hhmm(log.finishedAt);
        const durStr = (log.startedAt && log.finishedAt) ? Math.round((log.finishedAt - log.startedAt) / 60000) + '분' : '-';
        timeCells = `<td style="${S}text-align:center;color:#27ae60;">${startStr}</td><td style="${S}text-align:center;color:#c0392b;">${endStr}</td><td style="${S}text-align:center;color:#666;">${durStr}</td>`;
      }
      let row = `<tr><td style="${S}">${dateStr}</td><td style="${S}">${driver}</td><td style="${S}">${assist}</td><td style="${S}">${team}</td>${timeCells}`;
      let rowTotal = 0;
      for (const c of courses) {
        if (log.courseId === c.id) {
          row += `<td style="${S}background:${c.color}22;font-weight:700;text-align:center;">1</td>`;
          courseColTotals[c.id]++;
          rowTotal++;
        } else {
          row += `<td style="${S}"></td>`;
        }
      }
      row += `<td style="${S}font-weight:700;text-align:center;">${rowTotal}</td>`;
      dBody += row + '</tr>';
    }
    // 합계 행
    const grandTotal = Object.values(courseColTotals).reduce((s,v) => s+v, 0);
    let dFoot = `<tr style="background:#f0f0f0;font-weight:700;">
      <td colspan="${__showDetail ? 7 : 4}" style="${S}text-align:center;">합계</td>`;
    for (const c of courses) {
      dFoot += `<td style="${S}text-align:center;">${courseColTotals[c.id]}</td>`;
    }
    dFoot += `<td style="${S}text-align:center;">${grandTotal}</td></tr>`;
    document.getElementById('daily_' + uid).innerHTML = dHead + (dBody || '<tr><td colspan="99" class="empty">기록 없음</td></tr>') + dFoot;

    // ── 회원 × 코스 표 (금액 포함) ──
    const sortedAll = Object.entries(memberTotals).sort((a,b) => b[1]-a[1]);
    let thead = `<tr><th>${labels.row}</th>` + courses.map(c => `<th>${c.label}${__showDetail && c.detail ? '<br><span style="font-weight:400;font-size:10px;opacity:.7;">('+c.detail+')</span>' : ''}</th>`).join('') + '<th>총합</th>' + (hasUnitPrice ? '<th>금액</th>' : '') + '</tr>';
    let tbody = '';
    let allTotal = 0;
    for (const [name, total] of sortedAll) {
      if (total === 0) continue;
      allTotal += total;
      const isUnregistered = groupBy === 'member' && !members.find(m=>m.name===name);
      const isTop1 = sortedAll[0] && sortedAll[0][0] === name && sortedAll[0][1] > 0;
      const __rk = memberRank(matrix, name, courses);
      let row = `<tr><td>${isTop1 ? '⭐ ' : ''}${__rk ? tierBadge(__rk) : ''}${name}${isUnregistered ? ' <span class="sub">(미등록)</span>' : ''}</td>`;
      for (const c of courses) {
        const v = matrix[name]?.[c.id] || 0;
        row += `<td class="${v===0?'num-zero':v>=3?'num-high':''}">${v||''}</td>`;
      }
      row += `<td><b>${total}</b></td>`;
      if (hasUnitPrice) row += `<td style="white-space:nowrap;color:#2c3e50;font-weight:600;">${fmtWon(total * unitPrice)}</td>`;
      tbody += row + '</tr>';
    }
    // 합계 행
    let tfoot = `<tr style="background:#f0f0f0;font-weight:700;"><td>합계</td>`;
    for (const c of courses) {
      tfoot += `<td style="text-align:center;">${courseTotals[c.id] || 0}</td>`;
    }
    tfoot += `<td><b>${allTotal}</b></td>`;
    if (hasUnitPrice) tfoot += `<td style="white-space:nowrap;color:#c0392b;">${fmtWon(allTotal * unitPrice)}</td>`;
    tfoot += '</tr>';
    document.getElementById('tb_' + uid).innerHTML = thead + tbody + tfoot;
    renderRankCard(uid, sortedAll, matrix, courses);

// 누적 막대: 각 세그먼트 안에 코스별 개수 + 막대 위에 총합
const stackTotalsPlugin = {
  id: 'stackTotals',
  afterDatasetsDraw(chart) {
    const { ctx, data } = chart;
    if (!data.datasets.length) return;

    // 1) 각 세그먼트 안에 개수 표시 (흰색)
    data.datasets.forEach((ds, dsIdx) => {
      const meta = chart.getDatasetMeta(dsIdx);
      meta.data.forEach((bar, i) => {
        const v = ds.data[i] || 0;
        if (v === 0) return;
        const top = bar.y;
        const bottom = bar.base;
        const h = Math.abs(bottom - top);
        if (h < 14) return; // 너무 좁으면 생략
        ctx.save();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(v, bar.x, (top + bottom) / 2);
        ctx.restore();
      });
    });

    // 2) 막대 꼭대기 위에 총합 표시
    const lastMeta = chart.getDatasetMeta(data.datasets.length - 1);
    lastMeta.data.forEach((bar, i) => {
      let total = 0;
      data.datasets.forEach(ds => { total += (ds.data[i] || 0); });
      if (total === 0) return;
      ctx.save();
      ctx.fillStyle = '#222';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(total, bar.x, bar.y - 4);
      ctx.restore();
    });
  }
};

// 가로 막대: 세그먼트 안 숫자 + 막대 끝에 "N회"
const hbarTotalsPlugin = {
  id: 'hbarTotals',
  afterDatasetsDraw(chart) {
    const { ctx, data } = chart;
    if (!data.datasets.length) return;
    data.datasets.forEach((ds, dsIdx) => {
      const meta = chart.getDatasetMeta(dsIdx);
      meta.data.forEach((bar, i) => {
        const v = ds.data[i] || 0;
        if (v === 0) return;

        if (w < 16) return;
        ctx.save();
        ctx.fillStyle = '#fff'; ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(v, (bar.x + bar.base) / 2, bar.y);
        ctx.restore();
      });
    });
    const lastMeta = chart.getDatasetMeta(data.datasets.length - 1);
    lastMeta.data.forEach((bar, i) => {
      let total = 0;
      data.datasets.forEach(ds => { total += (ds.data[i] || 0); });
      if (total === 0) return;
      ctx.save();
      ctx.fillStyle = '#222'; ctx.font = 'bold 12px sans-serif';

function questWinners(liveMode) {

  if (__qWinCache[mode]) return __qWinCache[mode];

  // 기간 버킷으로 나눠 각 버킷 1등(방역 최다)에게 우승 1회씩
  function bucket(keyFn) { const b = {}; logs.forEach(l => { const t = l.startedAt || l.finishedAt || 0; const k = keyFn(l, t); (b[k] = b[k] || []).push(l); }); return b; }

    + '<input class="qMin" type="number" value="' + (Number(q.minMin) || 0) + '" placeholder="분" title="이 시간(분) 이상" style="width:52px;padding:6px;border:1px solid #ddd;border-radius:6px;"><span style="font-size:11px;color:#888;">분↑</span>'
    + '</span>'
    + '<span class="qHourWrap" style="display:none;align-items:center;gap:3px;">'
    + '<input class="qHour" type="number" min="0" max="23" value="' + (q.hour != null && q.hour !== '' ? Number(q.hour) : '') + '" placeholder="시" title="기준 시각(0~23시)" style="width:46px;padding:6px;border:1px solid #ddd;border-radius:6px;"><span style="font-size:11px;color:#888;">시 기준</span>'
    + '</span>'
    + '<span class="qCapWrap" style="display:none;align-items:center;gap:3px;">'
    + '<input class="qCap" type="number" min="0" value="' + (q.cap != null && q.cap !== '' ? Number(q.cap) : '') + '" placeholder="장" title="코스당 인정 최대 장수 (0/빈칸=무제한)" style="width:46px;padding:6px;border:1px solid #ddd;border-radius:6px;"><span style="font-size:11px;color:#888;">장/코스</span>'
    + '</span>'
    + '<select class="qLive" style="display:none;padding:6px;border:1px solid #ddd;border-radius:6px;" title="1등 인정 시점">'
    + '<option value=""' + (!q.liveTop ? ' selected' : '') + '>기간 끝나고 확정</option>'
    + '<option value="1"' + (q.liveTop ? ' selected' : '') + '>실시간 1등</option>'
    + '</select>'
    + '<input class="qXp" type="number" value="' + (Number(q.xp) || 0) + '" placeholder="XP" style="width:60px;padding:6px;border:1px solid #ddd;border-radius:6px;"><span style="font-size:11px;color:#888;">XP</span>'
    + '<button onclick="this.parentNode.remove()" style="background:#e74c3c;color:#fff;border:none;border-radius:6px;padding:0 10px;cursor:pointer;">✕</button></div>';
}
function __qToggleCat(sel) {
  const row = sel.closest('.qRow'); if (!row) return;
  const cat = row.querySelector('.qCat');
  const isInq = (sel.value === 'inquiry' || sel.value === 'comment' || sel.value === 'inqResolved');
  cat.style.display = isInq ? '' : 'none';
  const tw = row.querySelector('.qTripWrap');
  if (tw) tw.style.display = (sel.value === 'trip') ? 'inline-flex' : 'none';
  const lv = row.querySelector('.qLive');
  if (lv) lv.style.display = (TOP_TRIGGERS.indexOf(sel.value) >= 0) ? '' : 'none';
  const hw = row.querySelector('.qHourWrap');
  if (hw) {
    const isHour = (sel.value === 'early' || sel.value === 'late');
    hw.style.display = isHour ? 'inline-flex' : 'none';
    const hi = row.querySelector('.qHour');
    if (isHour && hi && hi.value === '') hi.value = (sel.value === 'early') ? 8 : 20;   // 기본값 채움
  }
  const cw = row.querySelector('.qCapWrap');
  if (cw) {
    const isPhoto = (sel.value === 'photoField' || sel.value === 'photoReceipt' || sel.value === 'photo');
    cw.style.display = isPhoto ? 'inline-flex' : 'none';
    const ci = row.querySelector('.qCap');
    if (isPhoto && ci && ci.value === '') ci.value = 5;   // 기본 코스당 5장
  }
}
function __qToggleMode(sel) { const row = sel.closest('.qRow'); if (!row) return; const th = row.querySelector('.qTh'); th.style.display = (sel.value === 'threshold') ? '' : 'none'; }
function __qInitCats() { document.querySelectorAll('#qList .qRow').forEach(r => { const t = r.querySelector('.qTrig'); if (t) __qToggleCat(t); const m = r.querySelector('.qMode'); if (m) __qToggleMode(m); }); }
function editRankTiers() {
  let role = null; try { role = getMyRole(); } catch (e) {}
  if (role !== 'super') { alert('SUPER만 가능합니다.'); return; }
  const tiers = getRankTiers();
  const xpc = getXpConfig();
  let modal = document.getElementById('rankTierModal');
  if (modal) modal.remove();
  modal = document.createElement('div');
  modal.id = 'rankTierModal';
  modal.style.cssText = 'position:fixed;inset:0;z-index:100000;background:rgba(0,0,0,.55);display:flex;align-items:flex-start;justify-content:center;padding:40px 12px;overflow-y:auto;';
  modal.onclick = e => { if (e.target === modal) modal.remove(); };
  modal.innerHTML = '<div style="background:#fff;border-radius:12px;width:100%;max-width:420px;padding:18px;box-shadow:0 8px 32px rgba(0,0,0,.3);">'
    + '<h3 style="margin:0 0 4px;">⚙ 계급 · 퀘스트 설정</h3>'
    + '<p class="sub" style="margin:0 0 10px;">퀘스트(XP 획득 규칙) · 계급(모양/이름/최소XP)</p>'
    + '<div style="font-weight:700;font-size:13px;margin-bottom:6px;">🧩 퀘스트 (XP 획득 규칙)</div>'
    + '<div id="qList">' + getQuests().map(q => __questRowTpl(q)).join('') + '</div>'
    + '<button onclick="document.getElementById(\'qList\').insertAdjacentHTML(\'beforeend\', __questRowTpl()); __qInitCats();" style="margin:2px 0 14px;background:#8e44ad;color:#fff;border:none;border-radius:6px;padding:8px 12px;font-weight:700;cursor:pointer;">+ 퀘스트 추가</button>'
    + '<div style="font-weight:700;font-size:13px;margin-bottom:6px;">🎖 계급 (모양 · 이름 · 최소 XP)</div>'
    + '<div id="rtList">' + tiers.map(t => __rtRowTpl(t)).join('') + '</div>'
    + '<div style="display:flex;gap:6px;margin:4px 0 12px;flex-wrap:wrap;">'
    + '<button onclick="document.getElementById(\'rtList\').insertAdjacentHTML(\'beforeend\', __rtRowTpl())" style="background:#3498db;color:#fff;border:none;border-radius:6px;padding:8px 12px;font-weight:700;cursor:pointer;">+ 계급 추가</button>'
    + '<button onclick="const a=__seedDefaultRankIcons();alert(a?(a+\'개 기본 계급장을 보관함에 넣었어요\'):\'이미 들어있어요\');" style="background:#16a085;color:#fff;border:none;border-radius:6px;padding:8px 12px;font-weight:700;cursor:pointer;">📁 기본 계급장 보관함에 채우기</button>'
    + '</div>'
    + '<div style="display:flex;gap:8px;"><button onclick="saveRankTiers()" style="flex:1;background:#27ae60;color:#fff;border:none;padding:11px;border-radius:8px;font-weight:700;cursor:pointer;">저장</button>'
    + '<button onclick="document.getElementById(\'rankTierModal\').remove()" style="flex:1;background:#555;color:#fff;border:none;padding:11px;border-radius:8px;font-weight:700;cursor:pointer;">취소</button></div></div>';
  document.body.appendChild(modal);
  __qInitCats();
}
function saveRankTiers() {
  const rows = document.querySelectorAll('#rtList .rtRow');
  const tiers = [];
  rows.forEach(r => {
    const name = (r.querySelector('.rtName').value || '').trim();
    const xp = parseInt(r.querySelector('.rtXp').value) || 0;
    const iconEl = r.querySelector('.rtIcon');
    const icon = iconEl ? (iconEl.value || '').trim() : '';
    const imgEl = r.querySelector('.rtImg');
    const img = imgEl ? (imgEl.value || '') : '';
    if (name) tiers.push({ name: name, minXp: xp, icon: icon, img: img });
  });
  if (!tiers.length) { alert('계급을 하나 이상 입력하세요.'); return; }
  tiers.sort((a, b) => a.minXp - b.minXp);
  // 🧩 퀘스트 수집
  const quests = [];
  document.querySelectorAll('#qList .qRow').forEach((r, i) => {
    const label = (r.querySelector('.qLabel').value || '').trim();
    const trigger = r.querySelector('.qTrig').value;
    const category = r.querySelector('.qCat').value || '';
    const mode = r.querySelector('.qMode') ? r.querySelector('.qMode').value : 'each';
    const threshold = parseInt(r.querySelector('.qTh') ? r.querySelector('.qTh').value : '0') || 0;
    const xp = parseInt(r.querySelector('.qXp').value) || 0;
    const minKm = parseFloat(r.querySelector('.qKm') ? r.querySelector('.qKm').value : '0') || 0;
    const minMin = parseInt(r.querySelector('.qMin') ? r.querySelector('.qMin').value : '0') || 0;
    const liveTop = !!(r.querySelector('.qLive') && r.querySelector('.qLive').value);
    const hourEl = r.querySelector('.qHour');
    const hour = (hourEl && hourEl.value !== '') ? Math.max(0, Math.min(23, parseInt(hourEl.value) || 0)) : null;
    const capEl = r.querySelector('.qCap');
    const cap = (capEl && capEl.value !== '') ? Math.max(0, parseInt(capEl.value) || 0) : 0;
    quests.push({ id: 'q' + i + '_' + trigger, label: label || questTriggerLabel(trigger), trigger: trigger, category: (trigger === 'inquiry' || trigger === 'comment' || trigger === 'inqResolved') ? category : '', mode: mode, threshold: threshold, xp: xp, minKm: minKm, minMin: minMin, liveTop: liveTop, hour: hour, cap: cap });
  });
  const d = loadData();
  d.rankTiers = tiers;
  d.quests = quests;
  // common.js 진급엔진 호환: 방역/세트 XP 동기화
  const vq = quests.find(q => q.trigger === 'vax'), sq = quests.find(q => q.trigger === 'set');
  d.xpConfig = { perVax: vq ? (Number(vq.xp) || 0) : 0, setBonus: sq ? (Number(sq.xp) || 0) : 0 };
  saveData(d);
  const m = document.getElementById('rankTierModal'); if (m) m.remove();
  if (typeof render === 'function') render();
  alert('계급·퀘스트 설정 저장됨!');
}

function exportStatsCSV() {
  let csv = '﻿';
  const tables = document.querySelectorAll('#statsContainer table');
  const headers = document.querySelectorAll('#statsContainer .card h2');
  let hIdx = 0;
  tables.forEach(table => {
    // 행사 제목 찾기 (table 앞의 📋 헤더)
    const section = table.closest('.card');
    const prevCards = section?.parentElement?.querySelectorAll('.card');
    csv += '\n';
    // 행사명 헤더 삽입
    const titleCard = table.closest('div')?.parentElement?.parentElement?.querySelector('h2');
    if (titleCard) csv += `"${titleCard.textContent.replace(/"/g,'""')}"\n`;
    for (const row of table.rows) {
      csv += [...row.cells].map(c => `"${c.textContent.replace(/"/g, '""')}"`).join(',') + '\n';
    }
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `방역통계-${todayStr()}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
