<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>계정관리</title>
  <link rel="stylesheet" href="style.css?v=20260511d">
</head>
<body>
<header>
  <h1>🔐 계정관리</h1>
  <nav>
    <a href="index.html">홈</a>
    <a href="admin.html">관리</a>
    <a href="members.html">인원</a>
    <a href="today.html">오늘운영</a>
    <a href="monitor.html">모니터링</a>
    <a href="stats.html">통계</a>
    <a href="accounts.html" class="active">계정</a>
    <a href="#" onclick="adminLogout();return false;">로그아웃</a>
  </nav>
</header>

<div class="container">
  <div class="card">
    <h2>현재 로그인</h2>
    <div id="meBox" class="muted">불러오는 중...</div>
  </div>

  <div class="card">
    <div class="flex-between"><h2>관리자 계정 <span id="acctCount" class="muted"></span></h2>
      <button onclick="openAddAccount()">+ 계정 추가</button>
    </div>
    <p class="muted" style="font-size:12px;margin-bottom:8px;">
      관리자/인원/모니터링/통계 페이지에 접근 가능. 각자 본인 이메일·비번으로 로그인합니다.
    </p>
    <div id="acctList"></div>
  </div>

  <!-- 추가 폼 -->
  <div id="addCard" class="card" style="display:none;border:2px solid #3498db;">
    <h2>+ 새 계정 추가</h2>
    <label>이메일</label>
    <input id="newEmail" type="email" placeholder="bsp1001@naver.com">
    <label>이름 (표시용)</label>
    <input id="newName" type="text" placeholder="정해원">
    <label>권한</label>
    <select id="newRole">
      <option value="viewer">viewer (인원/통계 조회만)</option>
      <option value="admin">admin (일반 관리자, 수정 가능)</option>
      <option value="super">super (모든 권한 + 계정관리)</option>
    </select>
    <div style="display:flex;gap:6px;margin-top:10px;">
      <button class="success" style="flex:1;" onclick="createAccount()">생성</button>
      <button class="gray" onclick="closeAddAccount()">취소</button>
    </div>
    <p class="muted" style="font-size:11px;margin-top:6px;">
      💡 초기 비밀번호는 자동으로 <b>123456</b>입니다. 본인에게 이메일·초기비번 전달 →
      첫 로그인 시 본인이 새 비번으로 변경합니다.
    </p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js?v=20260511d"></script>
<script src="common.js?v=20260511d"></script>
<script>
// 계정 생성용 보조 Firebase 앱 (현재 로그인 유지하기 위함)
let secondaryApp = null;
function getSecondaryAuth() {
  if (!secondaryApp) {
    secondaryApp = firebase.initializeApp(firebaseConfig, 'secondary');
  }
  return secondaryApp.auth();
}

window.onAuthSuccess = () => onDataReady(refreshAll);
window.onDataChanged = () => refreshAll();
checkAdminAuth().then(ok => { if (ok) onDataReady(refreshAll); });

function refreshAll() {
  renderMe();
  renderAccounts();
}

function renderMe() {
  const u = fbAuth.currentUser;
  const data = loadData();
  const meBox = document.getElementById('meBox');
  if (!u) { meBox.textContent = '로그인 안됨'; return; }
  const userInfo = (data.users || {})[u.uid] || {};
  meBox.innerHTML = `
    <b>${userInfo.name || '(이름 없음)'}</b>
    <span class="sub">${u.email}</span> ·
    권한: <b>${userInfo.role || 'admin'}</b>
  `;
}

function renderAccounts() {
  const data = loadData();
  const users = data.users || {};
  const entries = Object.entries(users);
  document.getElementById('acctCount').textContent = `(${entries.length}명)`;

  if (!entries.length) {
    document.getElementById('acctList').innerHTML = `
      <div class="empty">
        등록된 계정 정보가 없습니다.<br>
        <span class="sub">현재 로그인한 본인 정보를 super로 등록하려면 아래 클릭</span><br>
        <button onclick="registerSelfAsSuper()" class="success" style="margin-top:8px;">현재 계정을 super로 등록</button>
      </div>
    `;
    return;
  }

  const me = fbAuth.currentUser;
  const myRole = users[me?.uid]?.role || 'admin';
  document.getElementById('acctList').innerHTML = entries.map(([uid, u]) => {
    const isMe = uid === me?.uid;
    return `
      <div class="list-item">
        <div class="info">
          <div class="name">${u.name || '(이름 없음)'} ${isMe ? '<span class="tag" style="background:#27ae60">나</span>' : ''}</div>
          <div class="sub">${u.email || ''} · ${u.role || 'admin'} ${u.disabled ? '· 🚫 비활성' : ''}</div>
        </div>
        ${myRole === 'super' && !isMe ? `
          <button class="small" onclick="changeRole('${uid}', '${u.role||'admin'}')">권한</button>
          <button class="small" style="background:#9b59b6;" onclick="resetPassword('${uid}')">🔑 비번재설정</button>
          <button class="small ${u.disabled?'success':'danger'}" onclick="toggleDisabled('${uid}')">${u.disabled?'활성화':'비활성'}</button>
          <button class="small danger" onclick="removeAccount('${uid}')">제거</button>
        ` : ''}
      </div>
    `;
  }).join('');
}

function registerSelfAsSuper() {
  const u = fbAuth.currentUser;
  if (!u) return;
  const name = prompt('본인 이름 입력', u.email.split('@')[0]);
  if (!name) return;
  const data = loadData();
  if (!data.users) data.users = {};
  data.users[u.uid] = {
    email: u.email, name, role: 'super',
    createdAt: Date.now(), createdBy: 'self'
  };
  saveData(data);
}

function openAddAccount() {
  const me = fbAuth.currentUser;
  const myRole = (loadData().users || {})[me?.uid]?.role;
  if (myRole !== 'super') {
    alert('계정 추가는 super 권한만 가능합니다.\n계정 목록 위 "현재 계정을 super로 등록" 버튼으로 본인을 super로 만들 수 있어요.');
  }
  document.getElementById('addCard').style.display = 'block';
  document.getElementById('addCard').scrollIntoView({behavior:'smooth'});
}

function closeAddAccount() {
  document.getElementById('addCard').style.display = 'none';
  document.getElementById('newEmail').value = '';
  document.getElementById('newName').value = '';
}

async function createAccount() {
  const email = document.getElementById('newEmail').value.trim();
  const name = document.getElementById('newName').value.trim();
  const role = document.getElementById('newRole').value;
  if (!email || !name) { alert('이메일과 이름을 입력하세요'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { alert('올바른 이메일 형식이 아닙니다'); return; }

  const pw = '123456';

  try {
    const secAuth = getSecondaryAuth();
    const cred = await secAuth.createUserWithEmailAndPassword(email, pw);
    const newUid = cred.user.uid;
    await secAuth.signOut();

    const data = loadData();
    if (!data.users) data.users = {};
    data.users[newUid] = {
      email, name, role,
      createdAt: Date.now(),
      createdBy: fbAuth.currentUser?.email
    };
    saveData(data);
    closeAddAccount();
    alert(`✅ 계정 생성 완료\n\n${name}님께 전달:\n  이메일: ${email}\n  초기 비번: 123456\n\n첫 로그인 후 본인이 비번을 바꾸도록 안내하세요.`);
  } catch (e) {
    alert('생성 실패: ' + e.message);
  }
}

async function resetPassword(uid) {
  const data = loadData();
  const u = (data.users || {})[uid];
  if (!u || !u.email) { alert('계정 정보가 없습니다'); return; }

  // 가짜 이메일 (@bsp.local 등) 인지 체크 — 이런 건 메일 못 보냄
  if (/@(bsp|viewer)\.local$/i.test(u.email)) {
    alert(`⚠️ ${u.email}\n\n이 계정은 가짜 이메일 도메인이라 재설정 메일을 받을 수 없습니다.\n\n대신:\n1) 이 계정 [제거]\n2) 새 계정 만들기 (초기비번 123456)\n3) 본인이 첫 로그인 시 비번 변경`);
    return;
  }

  if (!confirm(`${u.name || u.email}님의 비밀번호 재설정 메일을 보낼까요?\n\n메일주소: ${u.email}\n\n→ 본인이 메일 받고 직접 새 비번 설정합니다.`)) return;
  try {
    await fbAuth.sendPasswordResetEmail(u.email);
    alert(`✅ ${u.email}로 재설정 메일 발송됨\n\n본인에게 "받은편지함 (또는 스팸함) 확인해서 링크 클릭" 안내해주세요.`);
  } catch (e) {
    alert('재설정 메일 발송 실패:\n' + e.message);
  }
}

function changeRole(uid, currentRole) {
  const newRole = prompt(`권한 변경 (현재: ${currentRole})\n\nadmin 또는 super 입력`, currentRole);
  if (!newRole || !['admin','super'].includes(newRole)) return;
  const data = loadData();
  if (data.users[uid]) {
    data.users[uid].role = newRole;
    saveData(data);
  }
}

function toggleDisabled(uid) {
  const data = loadData();
  if (!data.users[uid]) return;
  const willDisable = !data.users[uid].disabled;
  if (willDisable && !confirm('이 계정을 비활성화하시겠습니까?\n(로그인 가능하지만 데이터 접근 차단)')) return;
  data.users[uid].disabled = willDisable;
  saveData(data);
}

function removeAccount(uid) {
  if (!confirm('계정 정보를 제거할까요?\n\n⚠️ Firebase Auth의 사용자 자체는 콘솔에서 직접 삭제해야 합니다.\n여기서는 시스템 권한 정보만 제거됩니다.')) return;
  const data = loadData();
  if (data.users[uid]) {
    delete data.users[uid];
    saveData(data);
  }
}
</script>
</body>
</html>
