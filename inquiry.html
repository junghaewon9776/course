<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>민원게시판</title>
  <link rel="stylesheet" href="style.css?v=20260611b">
  <style>
    .cat-btn {
      display:inline-flex;align-items:center;gap:6px;
      padding:10px 16px;border:none;border-radius:10px;
      background:#34495e;font-size:14px;font-weight:600;cursor:pointer;
      transition:all .15s;color:#fff;
    }
    .cat-btn:hover { background:#2c3e50; }
    .cat-btn.selected { background:#2980b9;color:#fff; }
    .cat-btn .cat-icon { font-size:20px; }

    .sub-btn {
      display:inline-block;padding:7px 14px;border:none;border-radius:8px;
      background:#7f8c8d;font-size:13px;cursor:pointer;transition:all .15s;color:#fff;
    }
    .sub-btn:hover { background:#6c7a89; }
    .sub-btn.selected { background:#27ae60;color:#fff;font-weight:600; }

    .inq-card {
      border:1px solid #e0e0e0;border-radius:10px;padding:14px;margin-bottom:10px;
      background:#fff;transition:box-shadow .15s;
    }
    .inq-card:hover { box-shadow:0 2px 8px rgba(0,0,0,0.08); }
    .status-badge {
      display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;
    }
    .status-pending { background:#fff3cd;color:#856404; }
    .status-progress { background:#d1ecf1;color:#0c5460; }
    .status-resolved { background:#d4edda;color:#155724; }

    .admin-board { display:none; }
    body.is-admin .admin-board { display:block; }
    body.is-admin .admin-only { display:initial !important; }

    /* 게시판 (회원용) */
    .member-board { display:none; }
    body.is-member .member-board { display:block; }

    /* 회원 답변 버튼 */
    .reply-toggle {
      display:inline-block;padding:5px 12px;border-radius:6px;border:none;
      background:#27ae60;color:#fff;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px;
    }
    .reply-toggle:hover { background:#219a52; }

    /* 분류 편집 모달 태그 */
    .ce-sub-tag {
      display:inline-flex;align-items:center;gap:4px;
      background:#ebf5fb;border:1px solid #aed6f1;padding:5px 10px;border-radius:14px;font-size:13px;
    }
    .ce-sub-del {
      cursor:pointer;color:#e74c3c;font-weight:700;font-size:15px;line-height:1;
    }
    .ce-sub-del:hover { color:#c0392b; }
  </style>
</head>
<body>
<header>
  <h1>📋 민원게시판</h1>
  <nav>
    <a href="index.html">홈</a>
    <a href="admin.html">관리</a>
    <a href="members.html">인원</a>
    <a href="today.html">오늘운영</a>
    <a href="monitor.html">모니터링</a>
    <a href="monitor.html?logs=1">운행기록</a>
    <a href="inquiry.html" class="active">민원</a>
    <a href="teams.html">조별</a>
    <a href="stats.html">통계</a>
    <a href="#" id="loginLink" onclick="showLoginGate();return false;">로그인</a>
    <a href="#" id="logoutLink" onclick="inqLogout();return false;" style="display:none;">로그아웃</a>
  </nav>
</header>

<div class="container">
  <!-- ─── 접수 폼 ─── -->
  <div class="card" id="inqWriteCard" style="border-left:4px solid #3498db;">
    <h2>✏️ 민원 접수</h2>
    <p class="muted" style="font-size:13px;margin-bottom:14px;">해당하는 분류를 선택하고 내용을 작성해주세요.</p>

    <label style="font-size:13px;font-weight:700;margin-bottom:6px;display:block;">분류 선택</label>
    <select id="categorySel" onchange="selectCategory(this.value)" style="width:100%;padding:10px 12px;border:2px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:14px;box-sizing:border-box;background:#fff;">
      <option value="">-- 분류를 선택하세요 --</option>
    </select>

    <div id="subCategoryArea" style="display:none;margin-bottom:14px;">
      <label style="font-size:13px;font-weight:700;margin-bottom:6px;display:block;">상세 항목</label>
      <select id="subCategorySel" onchange="selectSub(this.value)" style="width:100%;padding:10px 12px;border:2px solid #ddd;border-radius:8px;font-size:14px;box-sizing:border-box;background:#fff;">
        <option value="">-- 항목을 선택하세요 --</option>
      </select>
    </div>

    <label style="font-size:13px;font-weight:700;">상세 내용</label>
    <textarea id="inqContent" rows="3" placeholder="구체적인 상황을 적어주세요" style="width:100%;box-sizing:border-box;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;resize:vertical;margin-bottom:12px;"></textarea>

    <label style="font-size:13px;font-weight:700;">연락처 <span style="font-weight:400;color:#aaa;">(선택)</span></label>
    <input id="inqPhone" type="tel" placeholder="010-0000-0000" style="width:100%;box-sizing:border-box;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:12px;">

    <label style="font-size:13px;font-weight:700;">📷 사진 첨부 <span style="font-weight:400;color:#aaa;">(선택 · 최대 3장)</span></label>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:6px 0 12px;">
      <button type="button" onclick="document.getElementById('inqImgUpload').click()" style="padding:8px 16px;background:#3498db;color:#fff;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;">+ 사진 추가</button>
      <input type="file" id="inqImgUpload" accept="image/*" multiple style="display:none" onchange="handleInqImages(event)">
      <div id="inqImgPreview" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
    </div>

    <label style="font-size:13px;font-weight:700;">📍 위치 <span style="font-weight:400;color:#aaa;">(선택 · 지도 탭=핑, 핑 드래그=이동, 검색=핑 이동)</span></label>
    <div id="inqPickerHost" style="margin:6px 0 16px;"></div>

    <button onclick="submitInquiry()" style="width:100%;padding:14px;background:#2980b9;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;">
      📨 접수하기
    </button>
  </div>

  <!-- ─── 내 접수 내역 ─── -->
  <div class="card">
    <h2>📜 내 접수 내역</h2>
    <div id="myInquiryList"></div>
  </div>

  <!-- ─── 회원 게시판 (로그인 회원용) ─── -->
  <div class="card member-board" style="border-left:4px solid #3498db;">
    <h2>📋 민원 게시판</h2>
    <p class="muted" style="font-size:12px;margin-bottom:10px;">전체 접수된 민원 현황을 확인할 수 있습니다.</p>
    <div id="memberBoardList"></div>
  </div>

  <!-- ─── 관리자 게시판 ─── -->
  <div class="card admin-board" style="border-left:4px solid #e67e22;">
    <div class="flex-between">
      <h2>⚙️ 전체 민원 관리</h2>
      <div style="display:flex;gap:4px;flex-wrap:wrap;">
        <select id="adminFilterCat" onchange="renderAdminBoard()" style="font-size:12px;padding:4px;">
          <option value="">전체 분류</option>
        </select>
        <select id="adminFilterStatus" onchange="renderAdminBoard()" style="font-size:12px;padding:4px;">
          <option value="">전체 상태</option>
          <option value="pending">대기</option>
          <option value="progress">처리중</option>
          <option value="resolved">완료</option>
        </select>
      </div>
    </div>
    <p class="muted" style="font-size:12px;margin-bottom:8px;">상태 변경, 메모 작성, 삭제 가능</p>

    <!-- 분류 편집 -->
    <details style="margin-bottom:12px;">
      <summary style="cursor:pointer;font-size:13px;font-weight:700;color:#e67e22;">🔧 분류 항목 편집</summary>
      <div id="categoryEditor" style="margin-top:8px;"></div>
      <button onclick="addCategory()" class="small success" style="margin-top:6px;">+ 분류 추가</button>
    </details>

    <div id="adminBoardList"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js?v=20260512v"></script>
<script src="common.js?v=20260702y"></script>
<script>
// ────── 기본 분류 데이터 ──────
const DEFAULT_CATEGORIES = [
  { id: 'course',  icon: '🗺', name: '코스관련',    subs: ['코스 분배', '코스 변경', '코스 추가', '코스 삭제', '조 변경'] },
  { id: 'vehicle', icon: '🚐', name: '차량',       subs: ['시동 불량', '타이어 펑크', '에어컨 고장', '배터리 방전', '엔진오일', '경고등', '접촉사고'] },
  { id: 'equip',   icon: '🔧', name: '방역기계',   subs: ['라보 방전', '분무기 고장', '호스 파손', '노즐 막힘', '압력 이상', '모터 소음'] },
  { id: 'drink',   icon: '🧊', name: '음료·간식',   subs: ['생수 부족', '음료 보충', '얼음 필요', '간식 요청', '컵·종이컵 부족'] },
  { id: 'fuel',    icon: '⛽', name: '주유·충전',   subs: ['기름 부족', '주유소 위치 문의', '충전 필요', '주유카드 문제'] },
  { id: 'payment', icon: '💳', name: '결제·비용',   subs: ['법인카드 문의', '영수증 처리', '식비 정산', '자재 구매', '기타 결제'] },
  { id: 'safety',  icon: '⚠️', name: '안전·사고',  subs: ['부상', '벌쏘임', '미끄러짐', '열사병', '기타 사고'] },
  { id: 'resident',icon: '🏠', name: '주민민원',   subs: ['소음 민원', '약제 피해', '주차 민원', '방역 요청'] },
  { id: 'anchorReq', icon: '📌', name: '거점추가요청', subs: [] },
  { id: 'noSprayReq',icon: '🚫', name: '방역금지구역', subs: [] },
  { id: 'etc',     icon: '💬', name: '기타',        subs: [] }
];

let selectedCat = '';
let selectedSub = '';

// ────── 초기화 ──────
function refreshInquiryPage() {
  const role = getMyRole();
  const isAdmin = role === 'admin' || role === 'super';
  const u = fbAuth.currentUser;
  const loggedIn = u && !u.isAnonymous;
  const isMember = loggedIn && !isAdmin;

  document.body.classList.toggle('is-admin', isAdmin);
  document.body.classList.toggle('is-member', isMember);

  // 🛡️ 민원 작성 권한: 간부만(admin) 설정 시 회원은 접수 폼 숨김
  const __cw = (typeof getAccessCfg === 'function') ? getAccessCfg().complaintWrite : 'all';
  const __wc = document.getElementById('inqWriteCard');
  if (__wc) __wc.style.display = (__cw === 'admin' && !isAdmin) ? 'none' : '';

  // 로그인/로그아웃 링크 전환
  document.getElementById('loginLink').style.display = loggedIn ? 'none' : '';
  document.getElementById('logoutLink').style.display = loggedIn ? '' : 'none';

  // 회원 nav 제어
  if (typeof applyMemberNav === 'function') applyMemberNav();

  renderCategoryBtns();
  renderMyInquiries();
  renderMemberBoard();
  renderAdminBoard();
  renderCategoryEditor();
}

// 로그인 성공 콜백 (common.js doLogin에서 호출됨)
window.onAuthSuccess = () => {
  const gate = document.getElementById('loginGate');
  if (gate) gate.remove();
  onDataReady(refreshInquiryPage);
};
window.onDataChanged = () => {
  refreshInquiryPage();
};

function inqLogout() {
  if (!confirm('로그아웃 하시겠습니까?')) return;
  _signingOut = true;
  stopFirebaseSync();
  fbAuth.signOut().then(() => {
    return fbAuth.signInAnonymously();
  }).then(() => {
    location.reload();
  }).catch(() => {
    location.reload();
  });
}

ensureAnonAuth().then(() => {
  initFirebaseSync();
  onDataReady(refreshInquiryPage);
});

// ────── 분류 가져오기 (DB 우선, 없으면 기본) ──────
function getCategories() {
  const data = loadData();
  let cats = (data.inquiryCategories && data.inquiryCategories.length)
    ? data.inquiryCategories.slice()
    : JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
  // 코스관련 분류가 누락된 옛 데이터 보강: 맨 앞에 자동 추가
  if (!cats.some(c => c.id === 'course')) {
    const courseCat = DEFAULT_CATEGORIES.find(c => c.id === 'course');
    if (courseCat) cats = [JSON.parse(JSON.stringify(courseCat)), ...cats];
  }
  ['resident','anchorReq','noSprayReq'].forEach(function(id){ if(!cats.some(function(c){return c.id===id;})){ var d=DEFAULT_CATEGORIES.find(function(c){return c.id===id;}); if(d) cats.push(JSON.parse(JSON.stringify(d))); } });
  return cats;
}

// ────── 분류 버튼 렌더 ──────
function renderCategoryBtns() {
  const cats = getCategories().filter(c => !c.disabled);
  const el = document.getElementById('categorySel');
  el.innerHTML = '<option value="">-- 분류를 선택하세요 --</option>' +
    cats.map(c => `<option value="${c.id}" ${selectedCat === c.id ? 'selected' : ''}>${c.icon} ${c.name}</option>`).join('');
  // 하위 항목도 갱신
  if (selectedCat) selectCategory(selectedCat);
}

function selectCategory(catId) {
  selectedCat = catId;
  selectedSub = '';
  const cats = getCategories();
  const cat = cats.find(c => c.id === catId);
  const area = document.getElementById('subCategoryArea');
  const el = document.getElementById('subCategorySel');
  if (cat && cat.subs && cat.subs.length) {
    area.style.display = 'block';
    el.innerHTML = '<option value="">-- 항목을 선택하세요 --</option>' +
      cat.subs.map(s => `<option value="${s}">${s}</option>`).join('') +
      '<option value="직접입력">✏ 직접입력</option>';
  } else {
    area.style.display = 'none';
    el.innerHTML = '';
  }
}

function selectSub(val) {
  selectedSub = val;
  if (val === '직접입력') {
    const ta = document.getElementById('inqContent');
    ta.focus();
    ta.placeholder = '직접 상세 내용을 입력해주세요';
  } else {
    document.getElementById('inqContent').placeholder = '구체적인 상황을 적어주세요';
  }
}

// ────── 📷 접수 사진 첨부 ──────
let __inqImages = [];
async function handleInqImages(e) {
  const files = Array.from(e.target.files || []);
  e.target.value = '';
  for (const f of files) {
    if (__inqImages.length >= 3) { alert('사진은 최대 3장까지'); break; }
    try { __inqImages.push(await compressImage(f, 900, 0.72)); } catch (err) { alert('사진을 불러오지 못했습니다'); }
  }
  renderInqImgPreview();
}
function renderInqImgPreview() {
  const el = document.getElementById('inqImgPreview');
  if (!el) return;
  el.innerHTML = __inqImages.map((img, i) =>
    `<span style="position:relative;display:inline-block;">
      <img src="${img}" style="width:72px;height:54px;object-fit:cover;border-radius:8px;border:1px solid #ddd;">
      <span onclick="__inqImages.splice(${i},1);renderInqImgPreview();" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#e74c3c;color:#fff;font-size:12px;line-height:20px;text-align:center;cursor:pointer;">✕</span>
    </span>`).join('');
}
// ────── 📍 접수 위치 첨부 ──────
let __inqLoc = null;
function attachInqLocation() {
  const st = document.getElementById('inqLocStatus');
  st.textContent = '위치 확인 중...';
  if (!navigator.geolocation) { st.textContent = '이 기기는 위치를 지원하지 않아요'; return; }
  navigator.geolocation.getCurrentPosition(pos => {
    __inqLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    st.textContent = '✅ 위치 첨부됨 (' + __inqLoc.lat.toFixed(5) + ', ' + __inqLoc.lng.toFixed(5) + ')';
    st.style.color = '#27ae60';
    document.getElementById('inqLocClear').style.display = '';
  }, err => {
    st.textContent = '❌ 위치를 가져오지 못했어요 (위치 권한 확인)';
    st.style.color = '#e74c3c';
  }, { enableHighAccuracy: true, timeout: 10000 });
}
function clearInqLocation() {
  __inqLoc = null;
  const st = document.getElementById('inqLocStatus');
  st.textContent = '위치 없음'; st.style.color = '#999';
  document.getElementById('inqLocClear').style.display = 'none';
  const rb = document.getElementById('inqAddrResults'); if (rb) rb.innerHTML = '';
}
// ────── 🗺 위치 지정 지도 피커 (관리 지도처럼: 탭=핑, 드래그=이동, 검색=핑 이동) ──────
function buildLocPicker(host, initial, onChange) {
  host.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.style.cssText = 'border:1.5px solid #ddd;border-radius:10px;padding:8px;background:#fafafa;';
  // 검색줄
  const srow = document.createElement('div'); srow.style.cssText = 'display:flex;gap:6px;margin-bottom:6px;';
  const sin = document.createElement('input'); sin.placeholder = '주소·장소명 검색 → 핑이 이동해요';
  sin.style.cssText = 'flex:1;box-sizing:border-box;padding:8px;border:1px solid #ddd;border-radius:8px;font-size:13px;';
  const sbtn = document.createElement('button'); sbtn.type = 'button'; sbtn.textContent = '🔍';
  sbtn.style.cssText = 'padding:8px 14px;background:#2c3e50;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;';
  srow.appendChild(sin); srow.appendChild(sbtn);
  const results = document.createElement('div');
  // 버튼줄 (지도 옆 작은 버튼들)
  const brow = document.createElement('div'); brow.style.cssText = 'display:flex;gap:6px;margin-bottom:6px;align-items:center;flex-wrap:wrap;';
  const gpsBtn = document.createElement('button'); gpsBtn.type = 'button'; gpsBtn.textContent = '📍 현재위치';
  gpsBtn.style.cssText = 'padding:6px 12px;background:#e67e22;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;';
  const clrBtn = document.createElement('button'); clrBtn.type = 'button'; clrBtn.textContent = '✕ 제거';
  clrBtn.style.cssText = 'padding:6px 12px;background:#95a5a6;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;display:none;';
  const rvBtn = document.createElement('button'); rvBtn.type = 'button'; rvBtn.textContent = '🗺 로드뷰';
  rvBtn.style.cssText = 'padding:6px 12px;background:#16a085;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;display:none;';
  rvBtn.onclick = function () { if (cur && typeof openRoadview === 'function') openRoadview(cur.lat, cur.lng, cur.name || '민원 위치'); };
  const status = document.createElement('span'); status.style.cssText = 'font-size:12px;color:#999;';
  brow.appendChild(gpsBtn); brow.appendChild(rvBtn); brow.appendChild(clrBtn); brow.appendChild(status);
  // 지도
  const mapDiv = document.createElement('div'); mapDiv.style.cssText = 'width:100%;height:230px;border-radius:8px;background:#eee;';
  wrap.appendChild(srow); wrap.appendChild(results); wrap.appendChild(brow); wrap.appendChild(mapDiv);
  host.appendChild(wrap);

  let pmap = null, marker = null, cur = initial ? { lat: initial.lat, lng: initial.lng, name: initial.name || '' } : null;
  function renderStatus() {
    status.textContent = cur ? ('✅ ' + (cur.name || (cur.lat.toFixed(5) + ', ' + cur.lng.toFixed(5)))) : '지도를 탭해 핑을 찍거나 검색하세요';
    status.style.color = cur ? '#27ae60' : '#999';
    clrBtn.style.display = cur ? '' : 'none';
    rvBtn.style.display = cur ? '' : 'none';
  }
  function emit() { onChange(cur ? { lat: cur.lat, lng: cur.lng, name: cur.name || '' } : null); renderStatus(); }
  function placeMarker(lat, lng, center) {
    if (!pmap) return;
    const pos = new kakao.maps.LatLng(lat, lng);
    if (!marker) {
      // 다른 지도들과 동일한 노란 전화 아이콘 (카카오 기본 핀은 너무 큼)
      const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="12" fill="#f1c40f" stroke="white" stroke-width="2"/><path d="M11 9c-.5 0-1 .4-1 1 0 4 3 7 7 7 .6 0 1-.4 1-1v-2c0-.5-.4-1-1-1l-2 .3c-.4-.6-.8-1-1.3-1.3l.3-2c0-.6-.4-1-1-1H11z" fill="white"/></svg>';
      const img = new kakao.maps.MarkerImage(
        'data:image/svg+xml;utf8,' + encodeURIComponent(svg),
        new kakao.maps.Size(28, 28),
        { offset: new kakao.maps.Point(14, 14) }
      );
      marker = new kakao.maps.Marker({ position: pos, map: pmap, draggable: true, image: img });
      kakao.maps.event.addListener(marker, 'dragend', () => {   // 핑 드래그로 미세 이동
        const p = marker.getPosition();
        setLoc(p.getLat(), p.getLng(), null, false);
      });
    } else marker.setPosition(pos);
    if (center !== false) pmap.setCenter(pos);
  }
  function setLoc(lat, lng, name, center) {
    cur = { lat: lat, lng: lng, name: name || '' };
    placeMarker(lat, lng, center);
    emit();
    if (name == null) {   // 이름 없으면 역지오코딩으로 주소 채움
      try {
        new kakao.maps.services.Geocoder().coord2Address(lng, lat, (res, st) => {
          if (st === kakao.maps.services.Status.OK && res[0]) {
            const a = res[0];
            const nm = (a.road_address && a.road_address.address_name) || (a.address && a.address.address_name) || '';
            if (cur && cur.lat === lat && cur.lng === lng) { cur.name = nm; emit(); }
          }
        });
      } catch (e) {}
    }
  }
  __loadKakaoForSearch(() => {
    const d = (typeof loadData === 'function' && loadData()) || {};
    const md = d.mapDefault || {};
    const c = cur ? new kakao.maps.LatLng(cur.lat, cur.lng) : new kakao.maps.LatLng(md.lat || 35.35, md.lng || 126.47);
    pmap = new kakao.maps.Map(mapDiv, { center: c, level: cur ? 3 : (md.level || 5) });
    setTimeout(() => { try { pmap.relayout(); pmap.setCenter(c); } catch (e) {} }, 150);
    kakao.maps.event.addListener(pmap, 'click', e => setLoc(e.latLng.getLat(), e.latLng.getLng(), null, false));   // 탭 = 핑
    if (cur) placeMarker(cur.lat, cur.lng, true);
    renderStatus();
  });
  function doSearch() {
    const q = (sin.value || '').trim();
    if (!q) return;
    results.innerHTML = '<div style="font-size:12px;color:#999;padding:4px;">🔍 검색 중...</div>';
    __loadKakaoForSearch(() => {
      const show = list => {
        if (!list.length) { results.innerHTML = '<div style="font-size:12px;color:#e74c3c;padding:4px;">검색 결과가 없어요</div>'; return; }
        results.innerHTML = '';
        list.slice(0, 5).forEach(r => {
          const it = document.createElement('div');
          it.textContent = '📍 ' + r.name;
          it.style.cssText = 'padding:8px 10px;border:1px solid #ddd;border-radius:8px;margin-bottom:4px;font-size:13px;cursor:pointer;background:#fff;';
          it.onclick = () => { results.innerHTML = ''; setLoc(r.lat, r.lng, r.name, true); };   // 검색 선택 = 핑 이동 (이후 드래그로 조정)
          results.appendChild(it);
        });
      };
      const geocoder = new kakao.maps.services.Geocoder();
      geocoder.addressSearch(q, (gd, gs) => {
        if (gs === kakao.maps.services.Status.OK && gd.length) { show(gd.map(x => ({ name: x.address_name, lat: +x.y, lng: +x.x }))); return; }
        new kakao.maps.services.Places().keywordSearch(q, (pd, ps) => {
          if (ps === kakao.maps.services.Status.OK && pd.length) show(pd.map(x => ({ name: x.place_name + (x.road_address_name || x.address_name ? ' (' + (x.road_address_name || x.address_name) + ')' : ''), lat: +x.y, lng: +x.x })));
          else show([]);
        });
      });
    });
  }
  sbtn.onclick = doSearch;
  sin.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); doSearch(); } };
  gpsBtn.onclick = () => {
    status.textContent = '위치 확인 중...'; status.style.color = '#999';
    if (!navigator.geolocation) { status.textContent = '이 기기는 위치를 지원하지 않아요'; return; }
    navigator.geolocation.getCurrentPosition(
      pos => setLoc(pos.coords.latitude, pos.coords.longitude, null, true),
      () => { status.textContent = '❌ 위치를 가져오지 못했어요'; status.style.color = '#e74c3c'; },
      { enableHighAccuracy: true, timeout: 10000 });
  };
  clrBtn.onclick = () => { cur = null; if (marker) { marker.setMap(null); marker = null; } emit(); };
  renderStatus();
  return { clear: () => clrBtn.onclick(), relayout: () => { try { if (pmap) pmap.relayout(); } catch (e) {} } };
}

// ────── 🔍 주소/장소 검색 (카카오) ──────
function __loadKakaoForSearch(cb) {
  if (window.kakao && kakao.maps && kakao.maps.services) return cb();
  if (document.querySelector('script[data-kakao-sdk]')) {
    const w = setInterval(() => { if (window.kakao && kakao.maps && kakao.maps.services) { clearInterval(w); cb(); } }, 200);
    setTimeout(() => clearInterval(w), 10000);
    return;
  }
  const s = document.createElement('script');
  s.dataset.kakaoSdk = '1';
  s.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=' + KAKAO_KEY + '&autoload=false&libraries=services';
  s.onload = () => kakao.maps.load(cb);
  s.onerror = () => { const b = document.getElementById('inqAddrResults'); if (b) b.innerHTML = '<div style="font-size:12px;color:#e74c3c;">지도 서비스를 불러오지 못했습니다</div>'; };
  document.head.appendChild(s);
}

// ────── 접수 ──────
function submitInquiry() {
  // 🛡️ 민원 작성 권한 체크
  const __cw = (typeof getAccessCfg === 'function') ? getAccessCfg().complaintWrite : 'all';
  if (__cw === 'admin') {
    const r = getMyRole();
    if (r !== 'admin' && r !== 'super') { alert('민원 작성은 간부만 가능합니다.'); return; }
  }
  if (!selectedCat) { alert('분류를 선택해주세요'); return; }
  const content = (document.getElementById('inqContent').value || '').trim();
  const phone = (document.getElementById('inqPhone').value || '').trim();
  const cats = getCategories();
  const cat = cats.find(c => c.id === selectedCat);

  if (!selectedSub && cat.subs?.length) { alert('상세 항목을 선택해주세요'); return; }
  if (selectedSub === '직접입력' && !content) { alert('직접입력을 선택하셨으면 내용을 작성해주세요'); return; }

  const data = loadData();
  if (!Array.isArray(data.inquiries)) data.inquiries = [];

  const u = fbAuth.currentUser;
  const uInfo = u && !u.isAnonymous ? (data.users || {})[u.uid] : null;
  const memberId = u ? (data.memberAuth || {})[u.uid] : null;
  const member = memberId ? (data.members || []).find(m => m.id === memberId) : null;
  const writerName = member?.name || uInfo?.name || u?.email || getDeviceName() || '익명';

  const inquiry = {
    id: uid(),
    category: selectedCat,
    categoryName: cat?.name || selectedCat,
    subCategory: selectedSub !== '직접입력' ? selectedSub : '',
    content,
    phone: phone || member?.phone || '',
    writer: writerName,
    writerUid: u?.uid || '',
    deviceName: getDeviceName() || '',
    status: 'pending',
    adminMemo: '',
    comments: [],
    images: __inqImages.slice(),
    lat: __inqLoc ? __inqLoc.lat : null,
    lng: __inqLoc ? __inqLoc.lng : null,
    locName: (__inqLoc && __inqLoc.name) || '',
    createdAt: Date.now()
  };
  // 📍 위치가 있으면 관리 지도의 민원 지역에도 자동 등록 (마커·근접 알림 연동)
  if (__inqLoc) {
    if (!Array.isArray(data.complaints)) data.complaints = [];
    const vis = (data.visibility || {}).events || {};
    const ev = (data.events || []).find(e => vis[e.id] !== false);
    const cId = uid();
    data.complaints.push({
      id: cId, eventId: (ev && ev.id) || '',
      lat: __inqLoc.lat, lng: __inqLoc.lng,
      phone: inquiry.phone || '',
      content: '[' + (cat?.name || '민원') + (selectedSub ? '·' + selectedSub : '') + '] ' + (content || ''),
      area: (__inqLoc && __inqLoc.name) || '',
      status: 'pending',
      createdAt: Date.now(),
      createdBy: writerName,
      inquiryId: inquiry.id
    });
    inquiry.complaintId = cId;
  }
  data.inquiries.push(inquiry);
  saveData(data);
  try { if (typeof checkPromotionForName === 'function') checkPromotionForName(writerName); } catch (e) {}

  // 텔레그램 알림
  sendTelegram(`📋 <b>회원민원 접수</b>\n분류: ${cat?.icon || ''} ${cat?.name || ''}\n항목: ${selectedSub || '-'}\n내용: ${(content || '-').slice(0, 80)}\n접수자: ${writerName}${phone ? '\n연락처: ' + phone : ''}`);
  // 📲 앱 푸시 (간부)
  { var __pt=pushTemplate('inq',{분류:(cat&&cat.name)||'',항목:selectedSub||'',내용:(content||'').slice(0,50),작성자:((typeof getDeviceName==='function'&&getDeviceName())||writerName)},'📋 새 민원 ({분류})','{항목} · {내용} — {작성자}'); if(typeof sendAppPush==='function') sendAppPush(__pt.title,__pt.body,'all','complaint'); }

  // 초기화
  selectedCat = ''; selectedSub = '';
  document.getElementById('inqContent').value = '';
  document.getElementById('inqPhone').value = '';
  __inqImages = []; renderInqImgPreview();
  if (window.__inqPickerApi) __inqPickerApi.clear();
  renderCategoryBtns();
  document.getElementById('subCategoryArea').style.display = 'none';
  document.getElementById('subCategorySel').innerHTML = '<option value="">-- 항목을 선택하세요 --</option>';
  renderMyInquiries();
  renderMemberBoard();
  renderAdminBoard();
  alert('✅ 접수되었습니다!\n관리자가 확인 후 처리할 예정입니다.');
}

// ────── 내 접수 내역 ──────
function renderMyInquiries() {
  const data = loadData();
  const u = fbAuth.currentUser;
  const el = document.getElementById('myInquiryList');
  if (!u || !data.inquiries?.length) {
    el.innerHTML = '<div class="empty" style="padding:20px;text-align:center;color:#aaa;">접수 내역이 없습니다</div>';
    return;
  }
  const myUid = u.uid;
  const deviceName = getDeviceName();
  const role = getMyRole();
  const isAdmin = role === 'admin' || role === 'super';
  const mine = (data.inquiries || [])
    .filter(q => q.writerUid === myUid || (deviceName && q.deviceName === deviceName))
    .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  if (!mine.length) {
    el.innerHTML = '<div class="empty" style="padding:20px;text-align:center;color:#aaa;">접수 내역이 없습니다</div>';
    return;
  }
  el.innerHTML = mine.map(q => renderInquiryCard(q, isAdmin, true)).join('');
}

// ────── 회원 게시판 (로그인 회원용 — 전체 문의 조회 + 답변) ──────
function renderMemberBoard() {
  const u = fbAuth.currentUser;
  const loggedIn = u && !u.isAnonymous;
  if (!loggedIn) return;
  const role = getMyRole();
  const isAdmin = role === 'admin' || role === 'super';
  if (isAdmin) return; // 관리자는 관리자 게시판 사용

  const data = loadData();
  const el = document.getElementById('memberBoardList');
  const all = (data.inquiries || []).slice().sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  if (!all.length) {
    el.innerHTML = '<div class="empty" style="padding:20px;text-align:center;color:#aaa;">접수된 민원이 없습니다</div>';
    return;
  }
  el.innerHTML = all.map(q => renderInquiryCard(q, false, false, true)).join('');
}

// 작성자 표시: admin/super 계정은 '관리자', 그 외(회원/주민)는 등록된 성명/닉네임
function writerLabel(uid, name) {
  try {
    const data = loadData();
    const ui = (data.users || {})[uid];
    if (ui && (ui.role === 'admin' || ui.role === 'super')) return '관리자';
  } catch (e) {}
  return name || '익명';
}

            <button onclick="deleteComment('${q.id}',${ci})" style="background:none;border:none;color:#e74c3c;font-size:12px;cursor:pointer;padding:0;">🗑 삭제</button>

          <div style="margin-top:4px;color:#444;white-space:pre-wrap;">${(c.text||'').replace(/</g,'&lt;')}</div>

// ────── 댓글 ──────
function toggleCommentForm(id) {
  const form = document.getElementById('commentForm_' + id);
  if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

function submitComment(id) {
  const text = (document.getElementById('commentText_' + id).value || '').trim();
  if (!text) { alert('댓글 내용을 입력해주세요'); return; }
  const data = loadData();
  const q = (data.inquiries || []).find(x => x.id === id);
  if (!q) return;
  const u = fbAuth.currentUser;
  const uInfo = u ? (data.users || {})[u.uid] : null;
  const memberId = u ? (data.memberAuth || {})[u.uid] : null;
  const member = memberId ? (data.members || []).find(m => m.id === memberId) : null;
  const writerName = member?.name || uInfo?.name || u?.email || getDeviceName() || '익명';

  if (!Array.isArray(q.comments)) q.comments = [];
  q.comments.push({
    writer: writerName,
    writerUid: u?.uid || '',
    text,
    createdAt: Date.now()
  });
  saveData(data);
  try { if (typeof checkPromotionForName === 'function') checkPromotionForName(writerName); } catch (e) {}
  // 📲 글 작성자에게 푸시 (본인이 본인 글에 단 경우는 제외)
  try {
    const authorUid = q.writerUid || '';
    if (authorUid && authorUid !== (u?.uid || '') && typeof sendAppPush === 'function') {
      const fromName = writerLabel(u?.uid || '', writerName);
      const t = pushTemplate('inqReply', { 작성자: fromName, 내용: text.slice(0, 40) }, '💬 내 글에 답변이 달렸어요', '{작성자}: {내용}');
      sendAppPush(t.title, t.body, 'user', null, authorUid);
    }
  } catch (e) {}
  if (document.getElementById('commentText_' + id)) document.getElementById('commentText_' + id).value = '';
  renderMyInquiries();
  renderMemberBoard();
  renderAdminBoard();
}

// 댓글 수정
function editComment(id, ci) {
  const data = loadData();
  const q = (data.inquiries || []).find(x => x.id === id);
  if (!q || !Array.isArray(q.comments) || !q.comments[ci]) return;
  const c = q.comments[ci];
  const u = fbAuth.currentUser;
  let role = null; try { role = getMyRole(); } catch (e) {}
  const canMod = role === 'admin' || role === 'super';
  const isMine = c.writerUid && u && c.writerUid === u.uid;
  if (!canMod && !isMine) { alert('수정 권한이 없습니다'); return; }
  const next = prompt('댓글 수정', c.text || '');
  if (next == null) return;
  const v = next.trim();
  if (!v) { alert('내용을 입력해주세요'); return; }
  c.text = v;
  c.editedAt = Date.now();
  saveData(data);
  renderMyInquiries(); renderMemberBoard(); renderAdminBoard();
}

// 댓글 삭제
function deleteComment(id, ci) {
  const data = loadData();
  const q = (data.inquiries || []).find(x => x.id === id);
  if (!q || !Array.isArray(q.comments) || !q.comments[ci]) return;
  const c = q.comments[ci];
  const u = fbAuth.currentUser;
  let role = null; try { role = getMyRole(); } catch (e) {}
  const canMod = role === 'admin' || role === 'super';
  const isMine = c.writerUid && u && c.writerUid === u.uid;
  if (!canMod && !isMine) { alert('삭제 권한이 없습니다'); return; }
  if (!confirm('이 댓글을 삭제할까요?')) return;
  q.comments.splice(ci, 1);
  saveData(data);
  renderMyInquiries(); renderMemberBoard(); renderAdminBoard();
}

// ────── 관리자 게시판 ──────
function renderAdminBoard() {
  if (!document.body.classList.contains('is-admin')) return;
  const data = loadData();
  const el = document.getElementById('adminBoardList');
  const all = (data.inquiries || []).slice().sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

  // 필터
  const filterCat = document.getElementById('adminFilterCat').value;
  const filterStatus = document.getElementById('adminFilterStatus').value;
  const filtered = all.filter(q =>
    (!filterCat || q.category === filterCat) &&
    (!filterStatus || q.status === filterStatus)
  );

  // 분류 필터 옵션 갱신
  const cats = getCategories();
  const catSel = document.getElementById('adminFilterCat');
  const curCat = catSel.value;
  catSel.innerHTML = '<option value="">전체 분류</option>' +
    cats.map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
  catSel.value = curCat;

  // 통계
  const pending = all.filter(q => q.status === 'pending').length;
  const progress = all.filter(q => q.status === 'progress').length;
  const resolved = all.filter(q => q.status === 'resolved').length;

  const statsHtml = `
    <div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;">
      <span class="status-badge status-pending" style="font-size:13px;padding:6px 14px;">⏳ 대기 ${pending}</span>
      <span class="status-badge status-progress" style="font-size:13px;padding:6px 14px;">🔄 처리중 ${progress}</span>
      <span class="status-badge status-resolved" style="font-size:13px;padding:6px 14px;">✅ 완료 ${resolved}</span>
    </div>
  `;

  if (!filtered.length) {
    el.innerHTML = statsHtml + '<div class="empty">접수된 민원이 없습니다</div>';
    return;
  }
  el.innerHTML = statsHtml + filtered.map(q => renderInquiryCard(q, true, false)).join('');
}

let __editImages = [], __editLoc = null;
async function handleEditImages(e) {
  const files = Array.from(e.target.files || []);
  e.target.value = '';
  for (const f of files) {
    if (__editImages.length >= 3) { alert('사진은 최대 3장까지'); break; }
    try { __editImages.push(await compressImage(f, 900, 0.72)); } catch (err) { alert('사진을 불러오지 못했습니다'); }
  }
  renderEditImgPreview();
}
function renderEditImgPreview() {
  const el = document.getElementById('editImgPreview');
  if (!el) return;
  el.innerHTML = __editImages.map((img, i) =>
    `<span style="position:relative;display:inline-block;">
      <img src="${img}" style="width:72px;height:54px;object-fit:cover;border-radius:8px;border:1px solid #ddd;">
      <span onclick="__editImages.splice(${i},1);renderEditImgPreview();" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#e74c3c;color:#fff;font-size:12px;line-height:20px;text-align:center;cursor:pointer;">✕</span>
    </span>`).join('');
}
// ── 수정 모달: 위치 ──
function renderEditLocStatus() {
  const st = document.getElementById('editLocStatus'), clr = document.getElementById('editLocClear');
  if (!st) return;
  if (__editLoc) {
    st.textContent = '✅ ' + (__editLoc.name || (__editLoc.lat.toFixed(5) + ', ' + __editLoc.lng.toFixed(5))) + ' 첨부됨';
    st.style.color = '#27ae60';
    if (clr) clr.style.display = '';
  } else {
    st.textContent = '위치 없음'; st.style.color = '#999';

}
function attachEditLocation() {
  const st = document.getElementById('editLocStatus');
  st.textContent = '위치 확인 중...';
  if (!navigator.geolocation) { st.textContent = '이 기기는 위치를 지원하지 않아요'; return; }
  navigator.geolocation.getCurrentPosition(pos => {
    __editLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude, name: '' };
    renderEditLocStatus();
  }, () => { st.textContent = '❌ 위치를 가져오지 못했어요'; st.style.color = '#e74c3c'; }, { enableHighAccuracy: true, timeout: 10000 });
}
function clearEditLocation() {
  __editLoc = null;
  renderEditLocStatus();
  const rb = document.getElementById('editAddrResults'); if (rb) rb.innerHTML = '';
}
function searchEditAddress() {
  const q = (document.getElementById('editAddrQ').value || '').trim();
  const box = document.getElementById('editAddrResults');
  if (!q) { alert('주소나 장소명을 입력하세요'); return; }
  box.innerHTML = '<div style="font-size:12px;color:#999;">🔍 검색 중...</div>';
  __loadKakaoForSearch(() => {
    const show = list => {
      if (!list.length) { box.innerHTML = '<div style="font-size:12px;color:#e74c3c;">검색 결과가 없어요</div>'; return; }
      box.innerHTML = list.slice(0, 5).map(r =>
        '<div onclick="pickEditAddr(' + r.lat + ',' + r.lng + ',\'' + String(r.name).replace(/'/g, '') + '\')" style="padding:8px 10px;border:1px solid #ddd;border-radius:8px;margin-bottom:4px;font-size:13px;cursor:pointer;background:#fafafa;">📍 ' + String(r.name).replace(/</g, '&lt;') + '</div>').join('');
    };
    const geocoder = new kakao.maps.services.Geocoder();
    geocoder.addressSearch(q, (gd, gs) => {
      if (gs === kakao.maps.services.Status.OK && gd.length) { show(gd.map(d => ({ name: d.address_name, lat: +d.y, lng: +d.x }))); return; }
      const places = new kakao.maps.services.Places();
      places.keywordSearch(q, (pd, ps) => {
        if (ps === kakao.maps.services.Status.OK && pd.length) show(pd.map(d => ({ name: d.place_name + (d.road_address_name || d.address_name ? ' (' + (d.road_address_name || d.address_name) + ')' : ''), lat: +d.y, lng: +d.x })));
        else show([]);
      });
    });
  });
}
function pickEditAddr(lat, lng, name) {
  __editLoc = { lat: lat, lng: lng, name: name || '' };
  renderEditLocStatus();
  document.getElementById('editAddrResults').innerHTML = '';
}

function saveEditInq(id) {
  const data = loadData();
  const q = (data.inquiries || []).find(x => x.id === id);
  if (!q) return;
  const cats = getCategories();
  const catId = document.getElementById('editCat').value;
  const cat = cats.find(c => c.id === catId);
  q.category = catId;
  q.categoryName = cat?.name || catId;
  q.subCategory = (document.getElementById('editSub').value || '').trim();
  q.content = (document.getElementById('editContent').value || '').trim();
  q.phone = (document.getElementById('editPhone').value || '').trim();
  const memoEl = document.getElementById('editMemo');
  if (memoEl) q.adminMemo = (memoEl.value || '').trim();
  // 📷 사진 반영
  q.images = __editImages.slice();
  // 📍 위치 반영 + 관리 지도 민원 동기화
  if (!Array.isArray(data.complaints)) data.complaints = [];
  const __cContent = '[' + (cat?.name || '민원') + (q.subCategory ? '·' + q.subCategory : '') + '] ' + (q.content || '');
  let __c = q.complaintId ? data.complaints.find(x => x.id === q.complaintId) : null;
  if (__editLoc) {
    q.lat = __editLoc.lat; q.lng = __editLoc.lng; q.locName = __editLoc.name || '';
    if (__c) {   // 기존 지도 민원 위치·내용 갱신
      __c.lat = __editLoc.lat; __c.lng = __editLoc.lng;
      if (__editLoc.name) __c.area = __editLoc.name;
      __c.content = __cContent; __c.phone = q.phone || __c.phone || '';
    } else {     // 위치를 새로 붙였으면 지도 민원 생성
      const __cid = uid();
      const vis = (data.visibility || {}).events || {};
      const ev = (data.events || []).find(e => vis[e.id] !== false);
      data.complaints.push({
        id: __cid, eventId: (ev && ev.id) || '',
        lat: __editLoc.lat, lng: __editLoc.lng,
        phone: q.phone || '', content: __cContent,
        area: __editLoc.name || '', status: q.status === 'resolved' ? 'resolved' : 'pending',
        createdAt: Date.now(), createdBy: q.writer || '', inquiryId: q.id
      });
      q.complaintId = __cid;
    }
  } else {
    q.lat = null; q.lng = null; q.locName = '';
    if (__c) { data.complaints = data.complaints.filter(x => x.id !== q.complaintId); q.complaintId = ''; }   // 위치 제거 → 지도 민원도 제거
  }
  saveData(data);
  document.getElementById('editInqModal').remove();
  renderMyInquiries(); renderMemberBoard(); renderAdminBoard();
}

function deleteInquiry(id) {

  const u = fbAuth.currentUser;

  const isAdmin = role === 'admin' || role === 'super';
  const isOwner = u && q.writerUid && q.writerUid === u.uid;
  if (!isAdmin && !isOwner) { alert('삭제 권한이 없습니다'); return; }
  if (!confirm('이 민원을 삭제할까요?')) return;
  data.inquiries = (data.inquiries || []).filter(x => x.id !== id);

}

function openReplyModal(id) {
  const data = loadData();
  const q = (data.inquiries || []).find(x => x.id === id);
  if (!q) return;
  __replyImages = q.replyImages ? [...q.replyImages] : [];

  let modal = document.getElementById('replyModal');
  if (modal) modal.remove();
  modal = document.createElement('div');
  modal.id = 'replyModal';
  modal.style.cssText = 'position:fixed;inset:0;z-index:99999;background:rgba(44,62,80,0.7);display:flex;align-items:center;justify-content:center;padding:16px;';
  modal.onclick = e => { if (e.target === modal) modal.remove(); };
  modal.innerHTML = `
    <div style="background:#fff;border-radius:14px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,0.25);">
      <h3 style="margin:0 0 6px;color:#27ae60;">💡 답변 / 해결법 작성</h3>
      <p class="muted" style="font-size:12px;margin:0 0 14px;">접수자에게 표시됩니다. 사진도 첨부 가능!</p>

      <label style="font-size:13px;font-weight:700;">답변 내용</label>
      <textarea id="replyText" rows="5" placeholder="해결 방법이나 안내 사항을 적어주세요..."
        style="width:100%;box-sizing:border-box;padding:10px;border:1.5px solid #27ae60;border-radius:8px;font-size:14px;resize:vertical;margin:4px 0 12px;">${(q.reply||'').replace(/</g,'&lt;')}</textarea>

      <label style="font-size:13px;font-weight:700;">📷 사진 첨부</label>
      <div style="margin:6px 0 10px;">
        <button onclick="document.getElementById('replyImgUpload').click()" style="padding:8px 16px;background:#3498db;color:#fff;border:none;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;">+ 사진 추가</button>
        <input type="file" id="replyImgUpload" accept="image/*" multiple style="display:none" onchange="handleReplyImages(event)">
        <span class="muted" style="font-size:11px;margin-left:8px;">여러 장 가능 (자동 리사이즈)</span>
      </div>
      <div id="replyImgPreview" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;">
        ${__replyImages.map((img,i) => replyImgThumb(img,i)).join('')}
      </div>

      <div style="display:flex;gap:8px;">
        <button onclick="saveReply('${id}')" style="flex:1;background:#27ae60;color:#fff;border:none;padding:13px;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;">💾 답변 저장</button>
        <button onclick="document.getElementById('replyModal').remove()" style="flex:1;background:#555;color:#fff;border:none;padding:13px;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;">취소</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  document.getElementById('replyText').focus();
}

function replyImgThumb(img, idx) {
  return `<div style="position:relative;display:inline-block;">
    <img src="${img}" style="width:100px;height:75px;object-fit:cover;border-radius:6px;border:1px solid #ddd;">
    <button onclick="removeReplyImage(${idx})" style="position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;background:#e74c3c;color:#fff;border:none;font-size:13px;cursor:pointer;line-height:22px;padding:0;">✕</button>
  </div>`;
}

function removeReplyImage(idx) {
  __replyImages.splice(idx, 1);
  document.getElementById('replyImgPreview').innerHTML = __replyImages.map((img,i) => replyImgThumb(img,i)).join('');
}

function handleReplyImages(e) {
  const files = Array.from(e.target.files);
  e.target.value = '';
  if (!files.length) return;
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = () => {
      resizeImage(reader.result, 800, 0.7, (resized) => {
        __replyImages.push(resized);
        loaded++;
        if (loaded === files.length) {
          document.getElementById('replyImgPreview').innerHTML = __replyImages.map((img,i) => replyImgThumb(img,i)).join('');
        }
      });
    };
    reader.readAsDataURL(file);
  });
}

function resizeImage(dataUrl, maxWidth, quality, cb) {
  const img = new Image();
  img.onload = () => {
    let w = img.width, h = img.height;
    if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(canvas.toDataURL('image/jpeg', quality));
  };
  img.src = dataUrl;
}

function saveReply(id) {
  const text = (document.getElementById('replyText').value || '').trim();
  if (!text && !__replyImages.length) { alert('답변 내용이나 사진을 하나 이상 입력해주세요'); return; }
  const data = loadData();
  const q = (data.inquiries || []).find(x => x.id === id);
  if (!q) return;
  const u = fbAuth.currentUser;
  const uInfo = u ? (data.users || {})[u.uid] : null;
  q.reply = text;
  q.replyImages = __replyImages.slice();
  q.repliedAt = Date.now();
  q.repliedBy = uInfo?.name || u?.email || '';
  if (q.status === 'pending') q.status = 'progress';
  saveData(data);
  // 📲 글 작성자에게 답변 푸시
  try {
    const authorUid = q.writerUid || '';
    if (authorUid && authorUid !== (u?.uid || '') && typeof sendAppPush === 'function') {
      const t = pushTemplate('inqReply', { 작성자: '관리자', 내용: (text || '사진 답변').slice(0, 40) }, '💬 내 글에 답변이 달렸어요', '{작성자}: {내용}');
      sendAppPush(t.title, t.body, 'user', null, authorUid);
    }
  } catch (e) {}
  document.getElementById('replyModal').remove();
  __replyImages = [];
  renderMyInquiries(); renderMemberBoard(); renderAdminBoard();
}

function viewReplyImage(id, idx) {
  const data = loadData();
  const q = (data.inquiries || []).find(x => x.id === id);
  if (!q || !q.replyImages?.[idx]) return;
  let viewer = document.getElementById('imgViewer');
  if (viewer) viewer.remove();
  viewer = document.createElement('div');
  viewer.id = 'imgViewer';
  viewer.style.cssText = 'position:fixed;inset:0;z-index:999999;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;cursor:pointer;padding:20px;';
  viewer.onclick = () => viewer.remove();
  viewer.innerHTML = `<img src="${q.replyImages[idx]}" style="max-width:95vw;max-height:90vh;border-radius:8px;box-shadow:0 0 40px rgba(0,0,0,0.5);">
    <div style="position:fixed;top:16px;right:20px;color:#fff;font-size:32px;font-weight:700;cursor:pointer;">✕</div>`;
  document.body.appendChild(viewer);
}

// ────── 분류 편집 (관리자) — 카드 리스트 + 수정 모달 ──────
function renderCategoryEditor() {
  if (!document.body.classList.contains('is-admin')) return;
  const cats = getCategories();
  const el = document.getElementById('categoryEditor');
  el.innerHTML = cats.map((c, i) => {
    const disabled = c.disabled;
    const subsPreview = (c.subs || []).slice(0, 4).join(', ');
    const moreCount = (c.subs || []).length > 4 ? ` 외 ${c.subs.length - 4}개` : '';
    return `
      <div style="display:flex;align-items:center;gap:8px;padding:10px 12px;border:1.5px solid ${disabled ? '#ddd' : '#3498db'};border-radius:10px;margin-bottom:8px;background:${disabled ? '#f5f5f5' : '#fff'};${disabled ? 'opacity:0.5;' : ''}">
        <span style="font-size:24px;">${c.icon}</span>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:700;font-size:14px;color:${disabled ? '#999' : '#2c3e50'};">
            ${c.name} ${disabled ? '<span style="color:#e74c3c;font-size:11px;">(사용안함)</span>' : ''}
          </div>
          <div style="font-size:11px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
            ${subsPreview ? subsPreview + moreCount : '상세 항목 없음'}
          </div>
        </div>
        <button onclick="moveCat(${i},-1)" style="padding:4px 8px;border:none;border-radius:4px;background:#34495e;color:#fff;cursor:pointer;font-size:12px;font-weight:700;" title="위로">▲</button>
        <button onclick="moveCat(${i},1)" style="padding:4px 8px;border:none;border-radius:4px;background:#34495e;color:#fff;cursor:pointer;font-size:12px;font-weight:700;" title="아래로">▼</button>
        <button onclick="openCatEditModal(${i})" style="padding:6px 12px;border:none;border-radius:6px;background:#3498db;color:#fff;font-weight:700;font-size:12px;cursor:pointer;">✏ 수정</button>
      </div>
    `;
  }).join('');
}

// ── 분류 수정 모달 ──
const EMOJI_PICKS = ['🚐','🔧','🧊','⛽','💳','⚠️','🏠','💬','📌','🔥','💧','🏗','🩺','📦','🛠','🚿','🎯','📋','🧹','🧤','⚡','🌡️','🗑️','🚨'];

function openCatEditModal(idx) {
  const data = loadData();
  const cats = getCategories();
  const c = cats[idx];
  if (!c) return;

  let modal = document.getElementById('catEditModal');
  if (modal) modal.remove();
  modal = document.createElement('div');
  modal.id = 'catEditModal';
  modal.style.cssText = 'position:fixed;inset:0;z-index:99999;background:rgba(44,62,80,0.7);display:flex;align-items:center;justify-content:center;padding:16px;';
  modal.onclick = e => { if (e.target === modal) modal.remove(); };

  const subsHtml = (c.subs || []).map((s, si) => `
    <span class="ce-sub-tag" id="ceSubTag_${si}">
      ${s}
      <span class="ce-sub-del" onclick="ceSub_remove(${si})">✕</span>
    </span>
  `).join('');

  modal.innerHTML = `
    <div style="background:#fff;border-radius:14px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,0.25);">
      <h3 style="margin:0 0 16px;color:#2c3e50;">✏ 분류 수정</h3>

      <!-- 아이콘 -->
      <label style="font-size:13px;font-weight:700;">아이콘</label>
      <div style="display:flex;align-items:center;gap:8px;margin:6px 0 4px;">
        <span id="ceIconPreview" style="font-size:36px;width:50px;height:50px;display:flex;align-items:center;justify-content:center;border:2px solid #ddd;border-radius:10px;">${c.icon}</span>
        <input id="ceIconInput" type="text" value="${c.icon}" placeholder="이모지 붙여넣기" maxlength="4"
          style="width:80px;font-size:24px;text-align:center;padding:6px;border:1.5px solid #ddd;border-radius:8px;"
          oninput="document.getElementById('ceIconPreview').textContent=this.value">
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px;">
        ${EMOJI_PICKS.map(e => `<button onclick="document.getElementById('ceIconInput').value='${e}';document.getElementById('ceIconPreview').textContent='${e}';" style="font-size:20px;padding:4px 6px;border:none;border-radius:6px;background:#ecf0f1;cursor:pointer;">${e}</button>`).join('')}
      </div>

      <!-- 이름 -->
      <label style="font-size:13px;font-weight:700;">분류명</label>
      <input id="ceName" type="text" value="${(c.name||'').replace(/"/g,'&quot;')}" placeholder="분류 이름"
        style="width:100%;box-sizing:border-box;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:15px;font-weight:600;margin:4px 0 14px;">

      <!-- 사용 여부 -->
      <label style="display:flex;align-items:center;gap:8px;margin-bottom:14px;cursor:pointer;">
        <input id="ceDisabled" type="checkbox" ${c.disabled ? 'checked' : ''} style="width:18px;height:18px;">
        <span style="font-size:13px;font-weight:700;color:#e74c3c;">사용안함</span>
        <span style="font-size:11px;color:#999;">(체크하면 접수 폼에서 숨겨집니다)</span>
      </label>

      <!-- 상세 항목 -->
      <label style="font-size:13px;font-weight:700;">상세 항목</label>
      <div id="ceSubList" style="display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 8px;">
        ${subsHtml}
      </div>
      <div style="display:flex;gap:6px;margin-bottom:14px;">
        <input id="ceSubNew" type="text" placeholder="항목명 입력" style="flex:1;padding:8px;border:1.5px solid #ddd;border-radius:6px;font-size:13px;" onkeydown="if(event.key==='Enter'){ceSub_add();event.preventDefault();}">
        <button onclick="ceSub_add()" style="padding:8px 14px;background:#27ae60;color:#fff;border:none;border-radius:6px;font-weight:700;font-size:13px;cursor:pointer;">+ 추가</button>
      </div>

      <!-- 버튼 -->
      <div style="display:flex;gap:8px;">
        <button onclick="saveCatEdit(${idx})" style="flex:1;background:#3498db;color:#fff;border:none;padding:13px;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;">💾 저장</button>
        <button onclick="document.getElementById('catEditModal').remove()" style="flex:1;background:#555;color:#fff;border:none;padding:13px;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;">취소</button>
      </div>
      <div style="text-align:center;margin-top:10px;">
        <button onclick="deleteCatFromModal(${idx})" style="background:none;border:none;color:#e74c3c;font-size:13px;cursor:pointer;text-decoration:underline;">이 분류 완전 삭제</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);

  // 상세 항목 임시 저장용
  window.__ceSubs = [...(c.subs || [])];
}

function ceSub_add() {
  const input = document.getElementById('ceSubNew');
  const name = (input.value || '').trim();
  if (!name) return;
  window.__ceSubs.push(name);
  input.value = '';
  ceSub_renderList();
}

function ceSub_remove(si) {
  window.__ceSubs.splice(si, 1);
  ceSub_renderList();
}

function ceSub_renderList() {
  const el = document.getElementById('ceSubList');
  el.innerHTML = window.__ceSubs.map((s, si) => `
    <span class="ce-sub-tag" id="ceSubTag_${si}">
      ${s}
      <span class="ce-sub-del" onclick="ceSub_remove(${si})">✕</span>
    </span>
  `).join('');
}

function saveCatEdit(idx) {
  const data = loadData();
  const cats = getCategories();
  if (!cats[idx]) return;
  cats[idx].icon = (document.getElementById('ceIconInput').value || '📌').trim();
  cats[idx].name = (document.getElementById('ceName').value || '').trim() || '미정';
  cats[idx].disabled = document.getElementById('ceDisabled').checked;
  cats[idx].subs = [...window.__ceSubs];
  data.inquiryCategories = cats;
  saveData(data);
  document.getElementById('catEditModal').remove();
  renderCategoryBtns();
  renderCategoryEditor();
}

function deleteCatFromModal(idx) {
  if (!confirm('이 분류를 완전히 삭제할까요?\n(기존 접수된 건에는 영향 없음)')) return;
  const data = loadData();
  const cats = getCategories();
  cats.splice(idx, 1);
  data.inquiryCategories = cats;
  saveData(data);
  document.getElementById('catEditModal').remove();
  renderCategoryBtns();
  renderCategoryEditor();
}

function moveCat(idx, dir) {
  const data = loadData();
  const cats = getCategories();
  const swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= cats.length) return;
  [cats[idx], cats[swapIdx]] = [cats[swapIdx], cats[idx]];
  data.inquiryCategories = cats;
  saveData(data);
  renderCategoryBtns();
  renderCategoryEditor();
}

function addCategory() {
  const data = loadData();
  const cats = getCategories();
  const newIdx = cats.length;
  cats.push({ id: uid(), icon: '📌', name: '새 분류', subs: [], disabled: false });
  data.inquiryCategories = cats;
  saveData(data);
  renderCategoryBtns();
  renderCategoryEditor();
  // 바로 수정 모달 열기
  openCatEditModal(newIdx);
}
</script>
</body>
</html>
